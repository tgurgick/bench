<!doctype html>
<!-- tl bench — the notebook UI. One file, no build step, no dependencies.
     Served by bench/server.js; everything here renders JSON from /api and
     posts small actions back. All dynamic content passes through esc().

     Design: "field guide" — warm paper, botanical ink accent, editorial
     serif display (system stacks only; no webfonts, no external fetches).
     Tokens mirror the approved mock; light + dark both first-class. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tl bench</title>
<style>
  :root {
    /* field-guide tokens — cooler paper, restrained moss */
    --bg: #f6f4ee; --surface: #ffffff; --surface-2: #efece4; --surface-3: #e3dfd4;
    --border: rgba(30, 30, 30, 0.08); --border-2: rgba(30, 30, 30, 0.16);
    --text-1: #14140f; --text-2: #56564f; --text-3: #8f8f86;
    --accent: #2f5b34; --accent-2: #457c47; --accent-glow: rgba(47, 91, 52, 0.10);
    --green: #2f5b34; --green-dim: rgba(47, 91, 52, 0.10);
    --amber: #8a5a1b; --amber-dim: rgba(138, 90, 27, 0.12);
    --red: #9a3a2f; --red-dim: rgba(154, 58, 47, 0.12);
    --node-bg: #ffffff; --node-border: rgba(30, 30, 30, 0.10);
    --on-accent: #f8f6f0;
    --p-bedrock: #3d6fb8; --p-anthropic: #d97757; --p-gemini: #4285f4;
    --radius: 10px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --display: "Fraunces", "Iowan Old Style", Georgia, serif;
  }
  :root.dark {
    /* candlelit paper */
    --bg: #1a150d; --surface: #221c13; --surface-2: #2b2418; --surface-3: #382e1f;
    --border: rgba(240, 220, 180, 0.10); --border-2: rgba(240, 220, 180, 0.20);
    --text-1: #f4ecda; --text-2: #b8ab8f; --text-3: #7f725a;
    --accent: #94c48c; --accent-2: #a9d29f; --accent-glow: rgba(148, 196, 140, 0.14);
    --green: #94c48c; --green-dim: rgba(148, 196, 140, 0.14);
    --amber: #d68b3f; --amber-dim: rgba(214, 139, 63, 0.16);
    --red: #e07564; --red-dim: rgba(224, 117, 100, 0.16);
    --node-bg: #221c13; --node-border: rgba(240, 220, 180, 0.12);
    --on-accent: #1a150d;
    --p-bedrock: #7fa7de; --p-anthropic: #e08a63; --p-gemini: #8ab4f8;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; overflow: hidden; background: var(--bg); color: var(--text-1);
    font: 13.5px/1.55 var(--sans);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  a { color: var(--accent); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

  /* the hidden <symbol> sheet every cell-type icon is <use>d from */
  .icon-defs { position: absolute; width: 0; height: 0; overflow: hidden; }

  /* ---------- the rail: app mark + four views + theme ---------- */
  .rail {
    width: 52px; flex: none; display: flex; flex-direction: column; align-items: center;
    gap: 6px; padding: 10px 0; border-right: 1px solid var(--border); background: var(--bg);
    height: 100%;
  }
  .rail .mark {
    width: 32px; height: 32px; border-radius: 9px; background: var(--accent);
    color: var(--on-accent); display: grid; place-items: center; margin-bottom: 10px;
  }
  .rail button {
    width: 34px; height: 34px; border-radius: 9px; border: 1px solid transparent;
    background: none; color: var(--text-3); cursor: pointer; display: grid; place-items: center;
    padding: 0;
  }
  .rail button:hover { color: var(--text-1); background: var(--surface-2); }
  .rail button.active { color: var(--accent); border-color: var(--accent); background: var(--surface); }
  .rail .push { flex: 1; }
  .rail svg { width: 18px; height: 18px; }

  /* ---------- content column ---------- */
  .content { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow-y: auto; }
  .topbar {
    position: sticky; top: 0; z-index: 20; background: var(--bg);
    border-bottom: 1px solid var(--border); padding: 9px 20px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  select, input[type=text] {
    font: inherit; color: inherit; background: var(--surface); border: 1px solid var(--border-2);
    border-radius: 8px; padding: 4px 9px;
  }
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--border-2); background: var(--surface);
    color: var(--text-1); border-radius: 8px; padding: 4px 12px;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  button.quiet { border: none; background: none; color: var(--text-3); padding: 3px 6px; }
  button.quiet:hover { color: var(--text-1); }
  button:disabled { opacity: .5; cursor: default; }
  .providers { margin-left: auto; display: flex; gap: 10px; font-size: 12px; color: var(--text-3); }
  .providers .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .dot.ok { background: var(--accent); } .dot.no { background: var(--border-2); }
  /* provider brand hues (available only; unavailable stays muted).
     openai rides --text-1 so black flips to cream in dark mode. */
  .dot.ok.p-openai { background: var(--text-1); }
  .dot.ok.p-bedrock { background: var(--p-bedrock); }
  .dot.ok.p-anthropic { background: var(--p-anthropic); }
  .dot.ok.p-gemini { background: var(--p-gemini); }
  /* the built-in fixture provider displays as "offline" — a hollow accent
     ring, divided from the real-provider dots. Display-only relabel: the
     provider's internal name (and `provider: fixture` configs) stay fixture. */
  .dot.offline { background: transparent; box-shadow: inset 0 0 0 1.5px var(--accent); }
  .providers .prov-sep { width: 1px; height: 12px; background: var(--border-2); align-self: center; }

  main { width: 100%; max-width: 960px; margin: 0 auto; padding: 6px 24px 120px; }

  /* ---------- editorial header: serif title, small-caps kicker ---------- */
  .masthead { padding: 22px 0 6px; }
  .masthead .kicker {
    font: 600 10.5px var(--sans); letter-spacing: .14em; text-transform: uppercase;
    color: var(--text-3);
  }
  .masthead h1 {
    font-family: var(--display); font-weight: 600; font-size: 30px; line-height: 1.15;
    letter-spacing: -0.01em; margin: 4px 0 2px;
  }
  .masthead .sub { font-style: italic; color: var(--text-2); font-size: 13.5px; }
  /* the goal line: pencil stays subtle until the masthead is hovered */
  .masthead .goal-edit {
    border: none; background: none; color: var(--text-3); padding: 0 4px;
    font-size: 12px; cursor: pointer; opacity: 0; vertical-align: baseline;
  }
  .masthead:hover .goal-edit, .masthead .goal-edit:focus { opacity: 1; }
  .masthead .goal-edit:hover { color: var(--text-1); }
  .masthead .goal-form { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 2px; }
  .masthead .goal-form input { min-width: min(420px, 70vw); font-size: 13px; }

  /* the workspace picker demotes to a compact secondary control (tl mode) */
  select.ws-compact {
    font-size: 11.5px; color: var(--text-2); background: transparent;
    border-color: var(--border); padding: 3px 6px; max-width: 150px;
  }

  /* notebook toolbar under the masthead */
  .nb-tools { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; padding: 12px 0 16px; }
  .nb-tools .sep { color: var(--border-2); margin: 0 2px; }

  /* placeholder panel for views that arrive with later specs */
  .plate {
    background: var(--surface); border: 1px dashed var(--border-2); border-radius: 12px;
    padding: 42px 24px; text-align: center; color: var(--text-2); margin-top: 14px;
  }
  .plate .glyph { font-family: var(--display); font-size: 26px; color: var(--text-3); }
  .plate b { color: var(--text-1); }
  .plate .spec { font-family: var(--mono); font-size: 12px; color: var(--text-3); }

  /* ---------- the graph strip — the notebook's shape at a glance ---------- */
  .graph { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; padding: 2px 2px 14px; }
  .graph .gcell {
    font-size: 11.5px; font-family: var(--mono); padding: 2px 9px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--border-2); cursor: pointer; white-space: nowrap;
    color: var(--text-2);
  }
  .graph .gcell.fresh { border-color: var(--accent); color: var(--accent); background: var(--green-dim); }
  .graph .gcell.stale { border-color: var(--amber); background: var(--amber-dim); color: var(--amber); }
  .graph .gcell.err { border-color: var(--red); background: var(--red-dim); color: var(--red); }
  .graph .arrow { color: var(--text-3); font-size: 11px; }

  /* ---------- flow canvas — specimen plate over the notebook graph ---------- */
  .flow-shell { width: 100%; max-width: 1180px; margin: 0 auto; }
  .flow-board {
    display: grid; grid-template-columns: 46px minmax(520px, 1fr) 300px; gap: 14px;
    min-height: 620px; padding-top: 14px;
  }
  .flow-board.no-insp { grid-template-columns: 46px 1fr; }
  /* the node palette: one icon per cell type down the canvas's left edge —
     the same <symbol>s the node chips use, so vocabulary can never drift */
  .flow-palette {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 7px 0 8px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); align-self: start; position: sticky; top: 56px;
    z-index: 10; /* tooltips overlay the stage, which paints later in the DOM */
    box-shadow: 0 1px 2px rgba(30, 30, 30, 0.04);
  }
  .flow-palette .pal-head {
    font: 700 9px var(--sans); letter-spacing: .16em; text-transform: uppercase;
    color: var(--text-3); padding-bottom: 3px;
  }
  .pal-btn {
    position: relative; width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid transparent; background: none; color: var(--text-2);
    display: grid; place-items: center; padding: 0; cursor: pointer;
  }
  .pal-btn:hover, .pal-btn:focus-visible { color: var(--accent); background: var(--surface-2); border-color: var(--border); }
  .pal-btn::after {
    content: '+ ' attr(data-type); position: absolute; left: calc(100% + 10px); top: 50%;
    transform: translateY(-50%); background: var(--text-1); color: var(--bg);
    font: 600 11px var(--sans); padding: 3px 9px; border-radius: 6px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity .12s; z-index: 30;
  }
  .pal-btn:hover::after, .pal-btn:focus-visible::after { opacity: 1; }
  .type-icon { width: 18px; height: 18px; display: block; }
  .flow-node .node-icon .type-icon { width: 15px; height: 15px; }
  .flow-stage {
    position: relative; min-height: 560px; overflow: auto; border: 1px solid var(--border);
    border-radius: var(--radius); background-color: var(--bg);
    background-image: radial-gradient(circle, rgba(30, 30, 30, 0.10) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  :root.dark .flow-stage {
    background-image: radial-gradient(circle, rgba(240, 220, 180, 0.12) 1px, transparent 1px);
  }
  .flow-plane { position: relative; min-width: 780px; min-height: 540px; }
  .flow-edges { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
  .flow-edge { fill: none; stroke: var(--border-2); stroke-width: 1.4; }
  .flow-edge.ghost { stroke: var(--accent); stroke-width: 1.8; stroke-dasharray: 6 5; opacity: .8; }
  .flow-edge.hot { stroke: var(--accent); stroke-width: 2; }
  .flow-edge.chain { stroke: var(--accent); stroke-width: 1.8; stroke-dasharray: 6 4; opacity: .9; }
  .flow-edge.chain.hot { stroke-dasharray: none; stroke-width: 2.2; }
  .flow-node {
    position: absolute; width: 190px; min-height: 82px; border: 1px solid var(--node-border);
    border-radius: 8px; background: var(--node-bg); padding: 11px 12px; cursor: grab;
    user-select: none; box-shadow: 0 1px 2px rgba(30,30,30,.04), 0 12px 26px -22px rgba(30,30,30,.55);
  }
  .flow-node:active { cursor: grabbing; }
  .flow-node:hover, .flow-node.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow), 0 12px 28px -20px rgba(47,91,52,.55); }
  .flow-node .node-top { display: flex; align-items: center; gap: 8px; }
  .flow-node .node-icon {
    width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center;
    background: var(--surface-2); color: var(--accent); font-size: 14px; flex: none;
  }
  .flow-node .node-id { font-family: var(--mono); font-size: 12.5px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .flow-node .node-sub { color: var(--text-3); font-size: 11.5px; margin-top: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .flow-node .node-dot { margin-left: auto; width: 10px; height: 10px; border-radius: 50%; background: var(--border-2); flex: none; }
  .insp-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .insp-head h2 { margin: 0; min-width: 0; overflow-wrap: anywhere; }
  .insp-close { font-size: 16px; line-height: 1; flex: none; }
  .flow-inspector .node-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border-2); flex: none; }
  .flow-inspector .node-dot.running, .flow-inspector .node-dot.fresh { background: var(--green); }
  .flow-inspector .node-dot.stale { background: var(--amber); }
  .flow-inspector .node-dot.error { background: var(--red); }
  /* a fresh control node is grey "unconfigured", never red — explicit so the
     state reads as deliberate (same quiet grey as never-ran) */
  .flow-node .node-dot.unconfigured, .flow-inspector .node-dot.unconfigured { background: var(--border-2); }
  .flow-node .node-dot.running { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  .flow-node .node-dot.fresh { background: var(--green); }
  .flow-node .node-dot.stale { background: var(--amber); }
  .flow-node .node-dot.error { background: var(--red); }
  .flow-node .node-dot.note { background: var(--text-3); opacity: .5; }
  .flow-connect-port {
    position: absolute; right: -7px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; padding: 0; border-radius: 50%;
    border: 2px solid var(--node-bg); background: var(--accent); color: transparent;
    opacity: 0; cursor: crosshair; transition: opacity .12s, transform .12s;
  }
  .flow-node:hover .flow-connect-port, .flow-node.selected .flow-connect-port,
  .flow-connect-port:focus-visible { opacity: 1; }
  .flow-connect-port:hover, .flow-connect-port:focus-visible { transform: translateY(-50%) scale(1.18); border-color: var(--surface); }
  .flow-node.connect-target { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .flow-relayout {
    position: absolute; right: 14px; bottom: 14px; z-index: 4; width: 32px; height: 32px;
    display: grid; place-items: center; padding: 0; border-radius: 8px;
    background: var(--surface); color: var(--text-2); box-shadow: 0 4px 14px -10px rgba(30,30,30,.7);
  }
  .flow-relayout:hover, .flow-relayout:focus-visible { color: var(--accent); }
  .flow-relayout svg { width: 17px; height: 17px; }
  @keyframes pulse { 50% { transform: scale(1.35); opacity: .55; } }
  /* collapsed to a pill so it never covers the deepest node (which the
     left-to-right layout always parks in this corner); hover/focus expands */
  .flow-note-card {
    position: absolute; right: 18px; top: 18px; border: 1px solid var(--border);
    background: color-mix(in srgb, var(--surface) 92%, transparent); border-radius: 999px;
    padding: 4px 12px; color: var(--text-2); font-size: 12.5px; box-shadow: 0 10px 30px -26px rgba(30,30,30,.7);
  }
  .flow-note-card .body { display: none; }
  .flow-note-card:hover, .flow-note-card:focus-within {
    width: 230px; border-radius: 8px; padding: 12px 14px; z-index: 5;
  }
  .flow-note-card:hover .body, .flow-note-card:focus-within .body { display: block; }
  .flow-note-card:hover .label, .flow-note-card:focus-within .label { margin-bottom: 5px; }
  .flow-note-card .label { font: 700 10px var(--sans); letter-spacing: .13em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0; }
  .flow-inspector, .run-log {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; min-width: 0;
  }
  .flow-inspector h2 { font-family: var(--display); font-size: 20px; margin: 0 0 2px; }
  .flow-inspector .meta { color: var(--text-3); font-size: 12px; margin-bottom: 12px; }
  .flow-inspector .status-line { display: flex; align-items: center; gap: 7px; color: var(--text-2); margin: 8px 0 10px; }
  .flow-inspector pre { max-height: 220px; overflow: auto; }
  .flow-inspector textarea {
    width: 100%; min-height: 160px; font: 12px/1.5 var(--mono); padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 6px; background: var(--bg);
    color: var(--text); resize: vertical; box-sizing: border-box;
  }
  .flow-inspector .insp-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .flow-inspector .field-grid { display: grid; gap: 8px; margin: 8px 0 12px; }
  .flow-inspector .field-row { display: grid; gap: 4px; }
  .flow-inspector .field-row label { font: 700 10px var(--sans); letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); }
  .flow-inspector .field-row input, .flow-inspector .field-row select {
    width: 100%; box-sizing: border-box; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text-1); padding: 8px 9px; font: 12px var(--mono);
  }
  .flow-inspector .field-row textarea { min-height: 76px; }
  .flow-inspector .connect-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 6px; align-items: end; margin-top: 8px; }
  .flow-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 8px 0 12px; }
  .flow-editor textarea { border: 1px solid var(--border); border-radius: 8px; min-height: 180px; }
  .flow-side { display: flex; flex-direction: column; gap: 12px; }
  .run-log { margin-top: 12px; }
  .run-log summary { cursor: pointer; color: var(--text-2); font-weight: 600; }
  .run-log .lines { margin-top: 10px; max-height: 190px; overflow: auto; font: 11.5px/1.55 var(--mono); color: var(--text-2); }
  .run-log .line { border-top: 1px solid var(--border); padding: 5px 0; }
  @media (max-width: 880px) {
    .flow-shell { width: 100%; }
    .flow-board, .flow-board.no-insp { grid-template-columns: 1fr; }
    .flow-stage { min-height: 500px; }
    /* short/narrow canvas: the palette lies down and wraps instead of scrolling */
    .flow-palette { flex-direction: row; flex-wrap: wrap; position: static; width: 100%; padding: 6px 8px; }
    .flow-palette .pal-head { padding: 0 4px 0 2px; }
    .pal-btn::after { left: 50%; top: calc(100% + 8px); transform: translateX(-50%); }
  }

  /* ---------- cells as field-guide cards ---------- */
  .cell {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    margin: 0 0 14px; overflow: hidden;
    box-shadow: 0 1px 2px rgba(30, 30, 30, 0.04);
    transition: border-color .15s;
  }
  .cell:focus-within, .cell.editing { border-color: var(--border-2); }
  .cell.note { background: none; border: none; border-radius: 0; box-shadow: none; }
  .cell-head {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .chip {
    font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 999px; background: var(--surface-3); color: var(--text-2);
  }
  .chip.data, .chip.eval { background: var(--green-dim); color: var(--accent); }
  .chip.agent, .chip.metric, .chip.judge, .chip.golden { background: var(--amber-dim); color: var(--amber); }
  .chip.annotate { background: var(--red-dim); color: var(--red); }
  .cid { font-family: var(--mono); font-size: 12.5px; font-weight: 600; }
  .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); flex: none; }
  .status-dot.stale { background: var(--amber); }
  .status-dot.never { background: var(--border-2); }
  .status-dot.err { background: var(--red); }
  .cell-head .when { color: var(--text-3); font-size: 11.5px; }
  .cell-head .spacer { flex: 1; }

  .editor { display: none; border-bottom: 1px solid var(--border); }
  .cell.editing .editor { display: block; }
  textarea {
    display: block; width: 100%; border: none; background: var(--surface-2); color: var(--text-1);
    font: 12.5px/1.5 var(--mono); padding: 12px 14px; min-height: 60px; resize: vertical; outline: none;
  }
  .editor .bar { display: flex; gap: 8px; padding: 6px 12px; background: var(--surface-2); border-top: 1px dashed var(--border-2); align-items: center; }

  /* the output strip: flat inset on paper tint, like the mock's result rows */
  .out { padding: 11px 14px; }
  .out .err { color: var(--red); font-family: var(--mono); font-size: 12.5px; white-space: pre-wrap; }
  .out .empty { color: var(--text-3); font-size: 13px; }
  .kv { color: var(--text-2); font-size: 12px; margin-top: 6px; }
  .kv b { color: var(--text-1); font-weight: 600; }

  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th, td { text-align: left; padding: 5px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--text-3); font-weight: 600; font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em; }
  td.num, th.num { text-align: right; font-family: var(--mono); }
  .scroll { overflow-x: auto; }
  .winner { color: var(--green); font-weight: 700; }
  .verdict { font-size: 10.5px; font-weight: 700; padding: 1px 7px; border-radius: 999px; background: var(--surface-3); color: var(--text-2); }
  .verdict.pass { background: var(--green-dim); color: var(--accent); }
  .verdict.fail { background: var(--red-dim); color: var(--red); }

  pre.block {
    background: var(--surface-2); border-radius: 8px; padding: 10px 12px; overflow-x: auto;
    font: 12px/1.5 var(--mono); white-space: pre-wrap; margin: 8px 0; color: var(--text-1);
  }
  .trace { margin-top: 8px; border-left: 2px solid var(--border-2); padding-left: 12px; }
  .trace .t { font: 12px/1.6 var(--mono); margin: 2px 0; }
  .trace .t .tag { color: var(--text-3); }
  .trace .t.tool .tag { color: var(--accent-2); }

  .note-body { padding: 4px 2px; }
  .note-body h1 { font-family: var(--display); font-weight: 600; letter-spacing: -0.01em; font-size: 24px; margin: 20px 0 6px; }
  .note-body h2 { font-family: var(--display); font-weight: 600; font-size: 19px; margin: 16px 0 6px; }
  .note-body h3 { font-family: var(--display); font-weight: 600; font-size: 16px; margin: 14px 0 4px; }
  .note-body p { margin: 8px 0; color: var(--text-2); }
  .note-body code { background: var(--surface-3); border-radius: 4px; padding: 0 5px; font: 12px var(--mono); color: var(--text-1); }
  .note-edit { color: var(--text-3); float: right; opacity: 0; }
  .cell.note:hover .note-edit { opacity: 1; }

  /* ---------- annotation panel — the HITL surface stays loud ---------- */
  .anno-progress { height: 6px; background: var(--surface-3); border-radius: 999px; overflow: hidden; margin: 8px 0; }
  .anno-progress i { display: block; height: 100%; background: var(--accent); }
  .anno-item {
    border: 1px solid var(--border-2); border-left: 3px solid var(--accent);
    border-radius: var(--radius); padding: 12px 14px; margin-top: 10px; background: var(--surface-2);
  }
  .anno-item .q { color: var(--text-2); font-size: 12px; margin-bottom: 4px; }
  .anno-buttons { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
  .anno-buttons .key { color: var(--text-3); font-size: 11px; margin-left: 4px; }
  .tally { display: flex; gap: 12px; font-size: 12px; color: var(--text-2); margin-top: 8px; flex-wrap: wrap; }

  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--text-1); color: var(--bg); border-radius: 10px; padding: 8px 16px;
    font-size: 13px; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 50;
  }
  .toast.show { opacity: .95; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .home { color: var(--text-2); text-align: center; padding: 60px 0; }

  /* ---------- first-run onboarding — start from the thing being tested ---------- */
  .onboard { max-width: 760px; margin: 0 auto; }
  .ob-section { margin-top: 20px; }
  .ob-label {
    font: 700 10.5px var(--sans); letter-spacing: .13em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 8px;
  }
  .goal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(215px, 1fr)); gap: 10px; }
  .posture-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .choice {
    text-align: left; background: var(--surface); border: 1px solid var(--border-2);
    border-radius: var(--radius); padding: 12px 14px; cursor: pointer; display: block;
  }
  .choice:hover { border-color: var(--accent); }
  .choice.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
  .choice b { display: block; font-size: 13.5px; }
  .choice .d { display: block; color: var(--text-2); font-size: 12px; margin-top: 3px; }
  .ob-starter {
    background: var(--surface); border: 1px solid var(--border-2);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .ob-starter .tpl-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .ob-starter .tpl-title { font-family: var(--display); font-size: 19px; font-weight: 600; }
  .ob-starter .d { color: var(--text-2); font-size: 12.5px; margin-top: 4px; }
  .tag {
    font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 999px; background: var(--surface-3); color: var(--text-2);
  }
  .tag.live { background: var(--amber-dim); color: var(--amber); }
  .tag.offline { background: var(--green-dim); color: var(--accent); }
  .tag.rec { background: var(--accent-glow); color: var(--accent); }
  .ob-note { color: var(--text-3); font-size: 12px; font-style: italic; margin-top: 8px; }
  .ob-note code {
    background: var(--surface-3); border-radius: 4px; padding: 0 4px;
    font: 11.5px var(--mono); color: var(--text-1); font-style: normal;
  }
  .ob-note select { margin-left: 6px; }
  .ob-note textarea { display:block; width:100%; margin-top:6px; min-height:88px; resize:vertical; }
  .ob-create-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
  .ob-cli {
    font-family: var(--mono); font-size: 11.5px; color: var(--text-2);
    background: var(--surface-2); border-radius: 8px; padding: 7px 11px; margin-top: 12px;
  }

  /* ---------- results — stat cards + scatter ---------- */
  .results-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 14px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 14px;
  }
  .results-bar .hint { color: var(--text-3); font-size: 12.5px; font-style: italic; }
  .results-bar .filters { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .results-bar select {
    font-size: 12px; padding: 3px 8px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--border-2);
  }
  .stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 18px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
    padding: 14px 16px; box-shadow: var(--shadow);
  }
  .stat-card .label {
    font: 600 10px var(--sans); letter-spacing: .12em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 6px;
  }
  .stat-card .value {
    font-family: var(--display); font-size: 28px; font-weight: 600;
    color: var(--text-1); line-height: 1.1;
  }
  .stat-card .delta {
    display: inline-block; margin-top: 6px; font-size: 11.5px; font-family: var(--mono);
    padding: 2px 7px; border-radius: 999px; background: var(--surface-2); color: var(--text-2);
  }
  .stat-card .delta.up { background: var(--green-dim); color: var(--accent); }
  .stat-card .delta.down { background: var(--red-dim); color: var(--red); }
  .stat-card .note { margin-top: 6px; font-size: 11.5px; color: var(--text-3); }
  .scatter-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
    padding: 14px 16px 10px; box-shadow: var(--shadow);
  }
  .scatter-head {
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 8px;
  }
  .scatter-head h2 {
    font-family: var(--display); font-size: 18px; font-weight: 600; margin: 0; color: var(--text-1);
  }
  .scatter-legend { margin-left: auto; display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--text-2); }
  .scatter-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .scatter-legend i {
    width: 9px; height: 9px; border-radius: 50%; display: inline-block; background: currentColor;
  }
  .scatter-svg { width: 100%; height: auto; display: block; }
  .scatter-svg .axis { stroke: var(--border-2); stroke-width: 1; }
  .scatter-svg .tick { fill: var(--text-3); font: 10px var(--mono); }
  .scatter-svg .threshold {
    stroke: var(--amber); stroke-width: 1.25; stroke-dasharray: 5 4; opacity: .85;
  }
  .scatter-svg .pt { stroke: var(--bg); stroke-width: 1.25; opacity: .92; }
  .scatter-svg .pt:hover { opacity: 1; stroke-width: 2; }
  .results-empty {
    text-align: center; padding: 48px 16px; color: var(--text-2);
  }
  .results-empty .glyph { font-family: var(--display); font-size: 28px; color: var(--text-3); margin-bottom: 8px; }

  /* ---------- journal — run history catalog ---------- */
  .journal-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 14px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .journal-count { color: var(--text-2); font-size: 12.5px; }
  .journal-count b { color: var(--text-1); font-weight: 600; }
  .journal-filters { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
  .journal-filters select {
    font-size: 12px; padding: 3px 8px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--border-2);
  }
  .journal-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  .journal-table th {
    text-align: left; padding: 10px 8px; color: var(--text-3);
    font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
    border-bottom: 1px solid var(--border-2);
  }
  .journal-table td {
    padding: 12px 8px; border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  .journal-table tr.run-row { cursor: pointer; transition: background .12s; }
  .journal-table tr.run-row:hover { background: var(--surface-2); }
  .journal-table tr.run-row.newest { background: var(--accent-glow); }
  .journal-table tr.run-row.newest:hover { background: var(--green-dim); }
  .journal-table tr.open { background: var(--surface-2); }
  .jid { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text-1); }
  .pill {
    display: inline-block; font-size: 10.5px; font-weight: 700; letter-spacing: .04em;
    padding: 2px 9px; border-radius: 999px; text-transform: capitalize;
  }
  .pill.passed { background: var(--green-dim); color: var(--green); }
  .pill.partial { background: var(--amber-dim); color: var(--amber); }
  .pill.failed { background: var(--red-dim); color: var(--red); }
  .j-pipe .name { font-weight: 600; color: var(--text-1); }
  .j-pipe .meta { display: block; font-size: 11.5px; color: var(--text-3); margin-top: 1px; }
  .j-model { font-size: 12px; color: var(--text-2); max-width: 140px; }
  .score-cell { min-width: 88px; }
  .score-bar {
    height: 5px; background: var(--surface-3); border-radius: 999px; overflow: hidden; margin-bottom: 3px;
  }
  .score-bar i { display: block; height: 100%; border-radius: 999px; }
  .score-bar i.hi { background: var(--green); }
  .score-bar i.mid { background: var(--amber); }
  .score-bar i.lo { background: var(--red); }
  .score-val { font-family: var(--mono); font-size: 12px; color: var(--text-1); }
  .j-num { font-family: var(--mono); font-size: 12px; color: var(--text-2); }
  .j-time { font-size: 12px; color: var(--text-3); white-space: nowrap; }
  .journal-detail {
    margin: 8px 0 18px; padding: 14px 16px; background: var(--surface);
    border: 1px solid var(--border-2); border-radius: var(--radius);
  }
  .journal-detail .detail-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .journal-detail .detail-head .back {
    border: none; background: none; color: var(--text-3); padding: 2px 4px; cursor: pointer;
  }
  .journal-detail .detail-head .back:hover { color: var(--text-1); }
  .journal-empty {
    background: var(--surface); border: 1px dashed var(--border-2); border-radius: 12px;
    padding: 48px 28px; text-align: center; color: var(--text-2); margin-top: 18px;
  }
  .journal-empty .glyph { font-family: var(--display); font-size: 28px; color: var(--text-3); margin-bottom: 8px; }
  .journal-empty p { max-width: 420px; margin: 8px auto; line-height: 1.6; }
  .journal-empty .hint { font-size: 12.5px; color: var(--text-3); font-style: italic; }
</style>
</head>
<body>

  <header class="topbar">
    <select id="nb" title="project"></select>

<script>
'use strict';
// ---------------------------------------------------------------------------
// state + plumbing
// ---------------------------------------------------------------------------
const S = {
  ws: null, nb: null, boot: null, notebook: null, nbList: [],
  onboard: { goal: 'compare', posture: 'fixture', override: '', name: '', notes: '', copyFrom: '' },
  running: new Set(), activeRuns: {}, editing: new Set(), view: 'notebook',
  goalEditing: false,
  flow: { layout: null, selected: null, editing: false, logOpen: true, inspectorOpen: true, runLog: [], connect: null },
  journal: { runs: [], notebooks: [], models: [], nbFilter: '', modelFilter: '', detail: null, openId: null },
  results: { runs: [], models: [], modelFilter: '', xKey: '', yKey: '' },
};
const MODEL_COLORS = ['#2f5b34', '#457c47', '#8b6914', '#a35d3a', '#3d5a80', '#6b4c7a', '#2a6f6f', '#7a4e2d'];

const $ = s => document.querySelector(s);
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
// class-attribute values (verdicts etc.) are slug-sanitized, not HTML-escaped:
// entities would break CSS class matching (review finding).
const cls = s => String(s == null ? '' : s).toLowerCase().replace(/[^a-z0-9_-]/g, '');
function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 2200);
}
async function api(path) {
  const r = await fetch(path);
  const d = await r.json().catch(() => null); // non-JSON body → fall back to the status
  if (!r.ok) throw new Error((d && d.error) || `request failed (HTTP ${r.status})`);
  if (d && d.error) throw new Error(d.error);
  return d;
}
async function post(path, body) {
  const r = await fetch(path, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
  const d = await r.json().catch(() => null);
  if (!r.ok) throw new Error((d && d.error) || `request failed (HTTP ${r.status})`);
  if (d && d.error) throw new Error(d.error);
  return d;
}
const ago = ts => {
  if (!ts) return 'never ran';
  const s = (Date.now() - new Date(ts).getTime()) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return new Date(ts).toISOString().slice(0, 10);
};

function applyTheme(t) {
  document.documentElement.classList.toggle('dark', t === 'dark');
}
// ?view=flow&theme=dark deep links: presentation-only overrides so a fresh
// profile (screenshots, shared links) can land on a specific lens directly
const DEEP_LINK = new URLSearchParams(location.search);
(function initTheme() {
  const linked = DEEP_LINK.get('theme');
  const saved = localStorage.getItem('bench.theme');
  applyTheme((linked === 'dark' || linked === 'light' ? linked : null)
    || saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
})();
$('#theme').onclick = () => {
  const dark = !document.documentElement.classList.contains('dark');
  localStorage.setItem('bench.theme', dark ? 'dark' : 'light');
  applyTheme(dark ? 'dark' : 'light');
};

// per-view identity is the kicker only — the masthead title/goal belong to
// the project, constant across all four lenses
const VIEWS = {
  flow:     { kicker: 'SPECIMEN', spec: 'ui-flow-canvas' },
  notebook: { kicker: 'FIELD NOTEBOOK', spec: null },
  results:  { kicker: 'BENCH RESULTS', spec: 'ui-results-dashboard' },
  journal:  { kicker: 'JOURNAL', spec: 'ui-journal-run-history' },

async function setView(v) {
  if (!VIEWS[v]) return;
  S.view = v; localStorage.setItem('bench.view', v);
  for (const b of document.querySelectorAll('#rail button[data-view]'))
    b.classList.toggle('active', b.dataset.view === v);
  if (v === 'journal') await loadJournal();
  else if (v === 'results') await loadResults();
  else if (v === 'flow') await loadFlowLayout();

}
for (const b of document.querySelectorAll('#rail button[data-view]'))

S.view = VIEWS[DEEP_LINK.get('view')] ? DEEP_LINK.get('view')

async function boot() {
  S.boot = await api('/api/state');
  // "fixture" is bench jargon — display it as "offline" with a tooltip and a
  // hollow dot, set apart from the real-provider dots by a divider. Display
  // side only: the provider's internal name stays `fixture`.
  $('#providers').innerHTML = S.boot.providers.map(p => {
    if (p.name === 'fixture') {
      return `<span title="built-in offline provider (provider: fixture) — deterministic, no keys, no network">` +
        `<span class="dot offline"></span>offline</span><i class="prov-sep"></i>`;
    }
    return `<span title="${esc(p.reason)}"><span class="dot ${p.ok ? 'ok' : 'no'} p-${cls(p.name)}"></span>${esc(p.name)}</span>`;
  }).join('');
  const wsSel = $('#ws');
  wsSel.innerHTML = S.boot.workspaces.map(w => `<option>${esc(w.name)}</option>`).join('');
  // standalone mode (a single workspace) needs no picker; tl-integrated
  // checkouts keep it as a compact secondary control beside the projects list
  wsSel.hidden = S.boot.workspaces.length <= 1;
  S.ws = localStorage.getItem('bench.ws');
  if (!S.boot.workspaces.some(w => w.name === S.ws)) S.ws = (S.boot.workspaces[0] || {}).name || null;
  if (S.ws) wsSel.value = S.ws;
  await setView(S.view);
  await loadNotebooks();
}

async function loadNotebooks() {
  if (!S.ws) { $('#main').innerHTML = '<div class="home">No workspaces under projects/ — create one with /tl:new, then come back.</div>'; return; }
  const d = await api('/api/notebooks?ws=' + encodeURIComponent(S.ws));
  S.nbList = d.notebooks;
  const sel = $('#nb');
  sel.innerHTML = d.notebooks.map(n => `<option value="${esc(n.name)}">${esc(n.title)}</option>`).join('');
  const remembered = localStorage.getItem('bench.nb.' + S.ws);
  S.nb = d.notebooks.some(n => n.name === remembered) ? remembered : (d.notebooks[0] || {}).name || null;
  if (!S.nb) { S.notebook = null; S.goalEditing = false; }
  if (S.nb) { sel.value = S.nb; await loadNotebook(); }
  else if (S.view === 'journal') { await loadJournal(); }
  else if (S.view === 'results') { await loadResults(); }
  else {
    // first run: no notebooks yet — open the onboarding wizard, which starts
    // from the thing being tested and scaffolds a starter from the catalogue
    renderOnboarding();
  }
}

async function loadNotebook() {
  S.goalEditing = false;
  S.notebook = await api('/api/notebook?ws=' + encodeURIComponent(S.ws) + '&nb=' + encodeURIComponent(S.nb));
  if (S.view === 'flow') await loadFlowLayout();
  render();
}

async function loadFlowLayout() {
  if (!S.ws || !S.nb) { render(); return; }
  try {
    const d = await api('/api/layout?ws=' + encodeURIComponent(S.ws) + '&nb=' + encodeURIComponent(S.nb));
    S.flow.layout = d.layout || null;
  } catch (e) {
    S.flow.layout = null;
    toast(String(e.message || e));
  }
  render();
}

$('#ws').onchange = e => { S.ws = e.target.value; localStorage.setItem('bench.ws', S.ws); loadNotebooks(); };
$('#nb').onchange = e => { S.nb = e.target.value; localStorage.setItem('bench.nb.' + S.ws, S.nb); loadNotebook(); };

// ---------------------------------------------------------------------------
// first-run onboarding — start from the thing being tested. A deterministic
// template wizard: testing goal + provider posture map onto the same starter
// catalogue the CLI scaffolds from (`bench scaffold <id> --name <slug>`), so
// the UI path and the CLI path write identical notebooks. No network, no
// generation — the starters are inspectable markdown and explain themselves.
// ---------------------------------------------------------------------------
const ONBOARD_GOALS = [
  { id: 'compare', label: 'Compare answer quality', desc: 'Same task, several models — which reply wins?' },
  { id: 'tool-agent', label: 'Test a tool-using agent', desc: 'Does the agent actually reach for its tools?' },
  { id: 'chain', label: 'Chain agents together', desc: 'Draft with one agent, revise with another, judge both.' },
  { id: 'judge', label: 'Calibrate a judge', desc: 'Label outputs by hand and measure judge agreement.' },
];
const ONBOARD_POSTURES = [
  { id: 'fixture', label: 'Offline (fixture)', desc: 'No keys, no network — runs green anywhere.' },
  { id: 'live', label: 'Live provider', desc: 'Anthropic, OpenAI, or a compatible endpoint.' },
  { id: 'bedrock', label: 'Bedrock', desc: 'AWS credentials over the Converse API.' },
];
function recommendTemplateId(goal, posture) {
  if (posture === 'bedrock') return 'bedrock-smoke';
  if (posture === 'live' && goal === 'compare') return 'live-compare';
  return ({ compare: 'model-compare', 'tool-agent': 'tool-agent', chain: 'agent-chain', judge: 'judge-calibration' })[goal] || 'model-compare';
}
function onboardTemplates() { return (S.boot && S.boot.notebook_templates) || []; }
function onboardTemplate() {
  const list = onboardTemplates();
  const id = S.onboard.override || recommendTemplateId(S.onboard.goal, S.onboard.posture);
  return list.find(t => t.id === id) || list[0] || null;
}
// deterministic, offline naming: the template's default slug, suffixed past
// any notebook that already claims it (tool-agent, tool-agent-2, …)
function onboardName(t) {
  const used = new Set((S.nbList || []).map(n => n.name));
  const base = (t && t.default_name) || 'starter';
  if (!used.has(base)) return base;
  for (let i = 2; ; i++) if (!used.has(base + '-' + i)) return base + '-' + i;
}
function setOnboard(key, value) {
  S.onboard[key] = value;
  renderOnboarding();
}
function showOnboarding() {
  if (!S.ws) { toast('pick a workspace first'); return; }
  S.onboard = { goal: 'compare', posture: 'fixture', override: '', name: '', notes: '', copyFrom: '' };
  renderOnboarding();
}

    : (o.posture !== 'fixture'
      ? `<div class="ob-note">this starter ships offline on fixture — scaffold it, run it green, then flip the <code>provider:</code> lines to go live.</div>`
      : '');
  $('#main').innerHTML = `
  <div class="onboard">
    <div class="masthead">

    ${firstRun ? '' : `<button class="quiet" onclick="loadNotebooks()">← back to the project</button>`}
    <div class="ob-section"><div class="ob-label">Project</div>
      <div class="ob-starter">
        <div class="ob-create-row">
          <label>name <input type="text" id="ob-name" value="${esc(name)}" spellcheck="false" style="font-family:var(--mono)" oninput="S.onboard.name=this.value"></label>
          <label>or duplicate <select id="ob-copy" onchange="S.onboard.copyFrom=this.value">
            <option value="">start new</option>
            ${(S.nbList || []).map(n => `<option value="${esc(n.name)}" ${o.copyFrom === n.name ? 'selected' : ''}>${esc(n.title)} · ${esc(n.name)}</option>`).join('')}

    <div class="ob-section"><div class="ob-label">Proposed setup</div>

      <div class="ob-label" style="margin-top:12px">Testing goal</div>

    <div class="ob-section"><div class="ob-label">Model posture</div>

      <div class="ob-starter">
        <div class="tpl-head">
          <span class="tpl-title">${esc(t.title)}</span>

          </select></label>

async function createBlankFromOnboarding() {
  const el = $('#ob-name');
  const name = el && el.value.trim();
  if (!name) { toast('name the notebook first (lowercase slug)'); if (el) el.focus(); return; }
  try {
    const copy = $('#ob-copy');
    const notes = ($('#ob-notes') && $('#ob-notes').value) || '';
    const r = await post('/api/notebook-create', { ws: S.ws, name, copy_from: copy && copy.value, notes });
    localStorage.setItem('bench.nb.' + S.ws, r.name);
    await loadNotebooks(); toast('blank notebook created');
  } catch (e) { toast(String(e.message || e)); }
}
async function createFromOnboarding() {
  const t = onboardTemplate();
  if (!t) return;
  const nameEl = $('#ob-name');
  const name = (nameEl && nameEl.value.trim()) || onboardName(t);
  try {
    const copy = $('#ob-copy');
    const notes = ($('#ob-notes') && $('#ob-notes').value) || '';
    const r = await post('/api/notebook-create', copy && copy.value
      ? { ws: S.ws, name, copy_from: copy.value, notes }
      : { ws: S.ws, template: t.id, name, notes });
    localStorage.setItem('bench.nb.' + S.ws, r.name);
    await loadNotebooks();
    toast(r.live ? `scaffolded ${r.name} — LIVE starter, ships on fixture` : `scaffolded ${r.name} — hit ▶ run all`);
  } catch (e) { toast(String(e.message || e)); }
}

// actions
