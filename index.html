function flowLog(msg) {
  const d = new Date();
  const stamp = String(d.getHours()).padStart(2, '0') + ':' +
    String(d.getMinutes()).padStart(2, '0') + ':' +
    String(d.getSeconds()).padStart(2, '0') + '.' +
    String(d.getMilliseconds()).padStart(3, '0');
  S.flow.runLog.unshift({ stamp, msg });
  S.flow.runLog = S.flow.runLog.slice(0, 80);
}

async function runCell(id) {
  const key = id || '__all__';
  if (S.running.has(key)) return;
  const runId = makeRunId();
  flowLog(id ? `run ${id} requested` : 'run all requested');
  S.running.add(key);
  S.activeRuns[key] = runId;
  render();
  try {
    const r = await post('/api/run', { ws: S.ws, nb: S.nb, cell: id || undefined, force: Boolean(id), run_id: runId });
    S.notebook = r.notebook;
    if (r.status === 'cancelled') flowLog(`cancelled ${r.run_id}`);
    if (r.ran.length) r.ran.forEach(cid => flowLog(`ran ${cid}`));
    else if (r.status !== 'cancelled') flowLog(id ? `${id} already fresh` : 'nothing stale');
    toast(r.status === 'cancelled' ? 'run cancelled' : (r.ran.length ? 'ran: ' + r.ran.join(', ') : 'nothing stale'));
  } catch (e) {
    flowLog(`error: ${String(e.message || e)}`);
    toast(String(e.message || e));
    // a failed run may still have executed part of its plan — resync from disk
    // so fresh/stale dots and error markers reflect what actually happened
    try { S.notebook = await api('/api/notebook?ws=' + encodeURIComponent(S.ws) + '&nb=' + encodeURIComponent(S.nb)); }
    catch { /* server unreachable — keep the last known view */ }
  }
  S.running.delete(key);
  delete S.activeRuns[key];
  if (S.view === 'journal') loadJournal();
  else if (S.view === 'results') loadResults();
  else render();
}

function makeRunId() {
  const stamp = new Date().toISOString().replace(/[-:.TZ]/g, '').slice(0, 17);
  return 'run-' + stamp + '-' + Math.floor(Math.random() * 1e6);
}

async function cancelActiveRun() {
  const keys = Array.from(S.running);
  const key = keys[0];
  const runId = key && S.activeRuns[key];
  if (!runId) return;
  flowLog(`stop requested for ${runId}`);
  try {
    await post('/api/run-cancel', { run_id: runId });
    toast('stopping at next cell boundary');
  } catch (e) {
    toast(String(e.message || e));
  }
}

async function saveCell(id) {
  const cell = S.notebook.cells.find(c => c.id === id);
  const ta = document.getElementById('ed-' + id);
  if (!cell || !ta) return;
  await saveCellValue(cell, ta.value, () => {
    S.editing.delete(id);
  });
}

async function saveCellValue(cell, value, afterSave) {
  try {
    const body = cell.type === 'note'
      ? { ws: S.ws, nb: S.nb, id: cell.id, text: value }
      : { ws: S.ws, nb: S.nb, id: cell.id, raw: value };
    const r = await post('/api/cell-save', body);
    if (afterSave) afterSave();
    S.notebook = r.notebook;
    render(); toast('saved');
  } catch (e) { toast(String(e.message || e)); }
}

async function deleteCell(id) {
  if (!confirm('delete cell "' + id + '"?')) return;
  try {
    const r = await post('/api/cell-delete', { ws: S.ws, nb: S.nb, id });
    S.notebook = r.notebook; render(); toast('deleted');
  } catch (e) { toast(String(e.message || e)); }
}

async function addCell(type, after) {
  const before = new Set((S.notebook && S.notebook.cells || []).map(c => c.id));
  try {
    const r = await post('/api/cell-add', { ws: S.ws, nb: S.nb, type, after });
    S.notebook = r.notebook;
    const added = r.notebook.cells.map(c => c.id).find(cid => !before.has(cid));
    if (added) {
      S.editing.add(added);
      if (S.view === 'flow') {
        S.flow.selected = added;
        S.flow.inspectorOpen = true;
        S.flow.editing = true;
      }
    }
    render(); toast('added ' + type + ' cell');
    if (S.view === 'flow' && added && S.flow.editing) {
      const ta = document.getElementById('flow-ed-' + added);
      if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
    }
  } catch (e) { toast(String(e.message || e)); }
}

function toggleEdit(id) {
  if (S.editing.has(id)) S.editing.delete(id); else S.editing.add(id);
  render();
}

async function annotateItem(cellId, itemId, label) {
  try {
    await post('/api/annotate', { ws: S.ws, nb: S.nb, cell: cellId, item_id: itemId, label });
    const r = await post('/api/run', { ws: S.ws, nb: S.nb, cell: cellId, force: true });
    S.notebook = r.notebook; render();
  } catch (e) { toast(String(e.message || e)); }
}

async function decideGoldenItem(cellId, set, itemId, status) {
  try {
    await post('/api/golden-decide', { ws: S.ws, set, decisions: [{ id: itemId, status }] });
    const r = await post('/api/run', { ws: S.ws, nb: S.nb, cell: cellId, force: true });
    S.notebook = r.notebook; render();
  } catch (e) { toast(String(e.message || e)); }
}

// ---------------------------------------------------------------------------
// render — masthead + view dispatch
// ---------------------------------------------------------------------------
// Project-first: every view carries the same masthead — the notebook's title
// with its goal beneath. The view survives only in the small-caps kicker
// (SPECIMEN · <nb>) and the rail's active state. Absent goal → title only,
// no reserved line, no layout jump; the pencil rides the title instead.
function masthead() {
  const v = VIEWS[S.view];
  const kicker = v.kicker + (S.nb ? ' · ' + S.nb : '');
  const meta = (S.notebook && S.notebook.meta) || {};
  const title = meta.title || (S.notebook && S.notebook.name) || S.nb || S.ws || 'tl bench';
  const goal = meta.goal ? String(meta.goal) : '';
  const canEdit = Boolean(S.nb && S.notebook);
  const pencil = canEdit && !S.goalEditing
    ? `<button class="goal-edit" title="${goal ? 'edit the project goal' : 'add a project goal'}" onclick="startGoalEdit()">✎${goal ? '' : ' goal'}</button>`
    : '';
  let goalLine = '';
  if (S.goalEditing && canEdit) {
    goalLine = `<div class="goal-form">
      <input type="text" id="goal-input" value="${esc(goal)}" placeholder="one line: what is this project trying to prove?"
        onkeydown="if(event.key==='Enter')saveGoal();else if(event.key==='Escape')cancelGoalEdit()">
      <button class="primary" onclick="saveGoal()">save</button>
      <button class="quiet" onclick="cancelGoalEdit()">cancel</button>
    </div>`;
  } else if (goal) {
    goalLine = `<div class="sub">${esc(goal)}${pencil}</div>`;
  }
  return `<div class="masthead"><div class="kicker">${esc(kicker)}</div>
    <h1>${esc(title)}${goal || S.goalEditing ? '' : pencil}</h1>${goalLine}</div>`;
}

function startGoalEdit() {
  S.goalEditing = true;
  render();
  const el = document.getElementById('goal-input');
  if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
}
function cancelGoalEdit() {
  S.goalEditing = false;
  render();
}
async function saveGoal() {
  const el = document.getElementById('goal-input');
  if (!el) return;
  try {
    const r = await post('/api/notebook-meta', { ws: S.ws, nb: S.nb, updates: { goal: el.value } });
    S.notebook = r.notebook;
    S.goalEditing = false;
    render(); toast('goal saved');
  } catch (e) { toast(String(e.message || e)); }
}

function plate(view) {
  return masthead() + `<div class="plate"><div class="glyph">❦</div>
    <p>This plate is still being drawn — the <b>${esc(view)}</b> view arrives with its own spec.</p>
    <p class="spec">specs/${esc(VIEWS[S.view].spec)}/</p></div>`;
}

// ---------------------------------------------------------------------------
// results — stat cards + metric scatter
// ---------------------------------------------------------------------------
async function loadResults() {
  if (!S.ws) {
    $('#main').innerHTML = masthead() + '<div class="results-empty"><div class="glyph">❧</div><p>Pick a workspace to open the bench.</p></div>';
    return;
  }
  try {
    const d = await api('/api/journal?ws=' + encodeURIComponent(S.ws));
    S.results.runs = d.runs || [];
    S.results.models = d.models || [];
    const series = resultsSeriesKeys(S.results.runs);
    if (!series.includes(S.results.xKey)) S.results.xKey = series[0] || '';
    if (!series.includes(S.results.yKey)) S.results.yKey = series[1] || series[0] || '';
    renderResults();
  } catch (e) {
    $('#main').innerHTML = masthead() + `<div class="results-empty"><div class="glyph">❧</div>
      <p>Could not read trial results: ${esc(e.message || e)}</p></div>`;
  }
}

function resultsSeriesKeys(runs) {
  const keys = new Set();
  for (const r of runs || []) {
    for (const c of r.candidates || []) {
      if (c.judge_overall_mean != null && typeof c.judge_overall_mean === 'number') keys.add('judge_overall_mean');
      if (c.metrics && typeof c.metrics === 'object') {
        for (const k of Object.keys(c.metrics)) {
          if (typeof c.metrics[k] === 'number') keys.add(k);
        }
      }
    }
  }
  return [...keys];
}

function resultsPoints(runs, modelFilter) {
  const out = [];
  for (const r of runs || []) {
    for (const c of r.candidates || []) {
      const model = [c.provider, c.model].filter(Boolean).join('/') || c.candidate || 'unknown';
      if (modelFilter && model !== modelFilter) continue;
      out.push({
        run_id: r.run_id,
        notebook: r.notebook,
        cell: r.cell,
        date: r.date,
        candidate: c.candidate,
        model,
        winner: Boolean(c.winner),
        judge_overall_mean: c.judge_overall_mean,
        latency_ms_mean: typeof c.latency_ms_mean === 'number' ? c.latency_ms_mean : null,
        metrics: c.metrics || {},
        n: c.n,
        errors: c.errors,
        stamp: runStampMs(r),
      });
    }
  }
  return out;
}

function runStampMs(run) {
  const m = String(run.run_id || '').match(/^run-(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})?/);
  if (m) {
    const iso = `${m[1]}-${m[2]}-${m[3]}T${m[4]}:${m[5]}:${m[6] || '00'}Z`;
    const d = new Date(iso);
    if (!Number.isNaN(d.getTime())) return d.getTime();
  }
  if (run.date) {
    const d = new Date(run.date + 'T12:00:00Z');
    if (!Number.isNaN(d.getTime())) return d.getTime();
  }
  return 0;
}

function pointSeriesValue(pt, key) {
  if (!key) return null;
  if (key === 'judge_overall_mean') return typeof pt.judge_overall_mean === 'number' ? pt.judge_overall_mean : null;
  if (pt.metrics && typeof pt.metrics[key] === 'number') return pt.metrics[key];
  return null;
}

function notebookThresholds() {
  const cells = (S.notebook && S.notebook.cells) || [];
  const out = [];
  for (const c of cells) {
    if (c.type !== 'metric' && c.type !== 'judge') continue;
    const t = c.config && c.config.threshold;
    if (typeof t === 'number' && Number.isFinite(t)) out.push({ id: c.id, type: c.type, threshold: t });
  }
  return out;
}

function resultsStats(points) {
  const cards = [];
  const scored = points
    .map(p => ({ p, score: p.judge_overall_mean != null ? p.judge_overall_mean : firstMetricNum(p.metrics) }))
    .filter(x => typeof x.score === 'number')
    .sort((a, b) => b.score - a.score);
  if (scored.length) {
    const best = scored[0];
    const prev = scored[1];
    const delta = prev ? best.score - prev.score : null;
    cards.push({
      label: 'Best overall score',
      value: fmtScore(best.score),
      delta: delta == null ? null : { text: `${delta >= 0 ? '+' : ''}${fmtScore(delta)} ${best.p.model} · ${best.p.run_id}`, dir: delta >= 0 ? 'up' : 'down' },
      note: `${best.p.model} · ${best.p.run_id}`,
    });
  }
  const dayMs = 86400000;
  const now = new Date();
  const startToday = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
  const startYday = startToday - dayMs;
  const today = points.filter(p => p.stamp >= startToday);
  const yday = points.filter(p => p.stamp >= startYday && p.stamp < startToday);
  const todayRuns = new Set(today.map(p => p.run_id)).size;
  const ydayRuns = new Set(yday.map(p => p.run_id)).size;
  if (todayRuns || ydayRuns || points.length) {
    const d = todayRuns - ydayRuns;
    cards.push({
      label: 'Eval runs today',
      value: String(todayRuns),
      delta: { text: `${d >= 0 ? '+' : ''}${d} vs yesterday`, dir: d >= 0 ? 'up' : 'down' },
    });
  }
  // avg latency across rows that recorded one (fixture's 0ms rows mean
  // "not measured" — only live-provider latencies light the card)
  const lats = points.map(p => p.latency_ms_mean).filter(v => typeof v === 'number' && v > 0);
  if (lats.length) {
    const mean = lats.reduce((s, v) => s + v, 0) / lats.length;
    cards.push({
      label: 'Avg latency',
      value: mean >= 1000 ? (mean / 1000).toFixed(2) + 's' : Math.round(mean) + 'ms',
      note: `${lats.length} live candidate row${lats.length === 1 ? '' : 's'}`,
    });
  }
  const ths = notebookThresholds();
  if (ths.length) {
    const t = ths[0].threshold;
    let pass = 0, total = 0;
    for (const p of points) {
      const s = p.judge_overall_mean != null ? p.judge_overall_mean : firstMetricNum(p.metrics);
      if (typeof s !== 'number') continue;
      total++;
      // normalize 1–5 judge scales roughly onto 0–1 when threshold ≤ 1
      const cmp = (t <= 1 && s > 1) ? s / 5 : s;
      if (cmp >= t) pass++;
    }
    if (total) {
      const rate = pass / total * 100;
      cards.push({
        label: 'Pass rate',
        value: rate.toFixed(1) + '%',
        note: `threshold = ${t} (${ths[0].id})`,
      });
    }
  }
  return cards;
}

function firstMetricNum(metrics) {
  if (!metrics || typeof metrics !== 'object') return null;
  for (const k of Object.keys(metrics)) {
    if (typeof metrics[k] === 'number') return metrics[k];
  }
  return null;
}

function fmtScore(n) {
  if (n == null || Number.isNaN(Number(n))) return '—';
  const v = Number(n);
  return Number.isInteger(v) ? String(v) : v.toFixed(3).replace(/\.?0+$/, m => m.includes('.') ? m.replace(/0+$/, '').replace(/\.$/, '') : m);
}

function modelColor(model, models) {
  const i = Math.max(0, models.indexOf(model));
  return MODEL_COLORS[i % MODEL_COLORS.length];
}

function renderScatterSvg(points, xKey, yKey, models, threshold) {
  const W = 720, H = 340, pad = { l: 44, r: 18, t: 16, b: 36 };
  const plotW = W - pad.l - pad.r, plotH = H - pad.t - pad.b;
  const vals = points.map(p => ({
    p,
    x: pointSeriesValue(p, xKey),
    y: pointSeriesValue(p, yKey),
  })).filter(v => v.x != null && v.y != null);
  if (!vals.length) {
    return `<svg class="scatter-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="empty scatter">
      <text x="${W / 2}" y="${H / 2}" text-anchor="middle" class="tick">no points for these axes</text></svg>`;
  }
  let xmin = Math.min(...vals.map(v => v.x));
  let xmax = Math.max(...vals.map(v => v.x));
  let ymin = Math.min(...vals.map(v => v.y));
  let ymax = Math.max(...vals.map(v => v.y));
  if (xmin === xmax) { xmin -= 0.5; xmax += 0.5; }
  if (ymin === ymax) { ymin -= 0.5; ymax += 0.5; }
  const padFrac = 0.08;
  const xspan = xmax - xmin, yspan = ymax - ymin;
  xmin -= xspan * padFrac; xmax += xspan * padFrac;
  ymin -= yspan * padFrac; ymax += yspan * padFrac;
  const sx = v => pad.l + (v - xmin) / (xmax - xmin) * plotW;
  const sy = v => pad.t + (1 - (v - ymin) / (ymax - ymin)) * plotH;
  let svg = `<svg class="scatter-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(xKey)} vs ${esc(yKey)}">`;
  svg += `<line class="axis" x1="${pad.l}" y1="${pad.t + plotH}" x2="${pad.l + plotW}" y2="${pad.t + plotH}"/>`;
  svg += `<line class="axis" x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t + plotH}"/>`;
  svg += `<text class="tick" x="${pad.l + plotW / 2}" y="${H - 8}" text-anchor="middle">${esc(xKey)}</text>`;
  svg += `<text class="tick" x="12" y="${pad.t + plotH / 2}" text-anchor="middle" transform="rotate(-90 12 ${pad.t + plotH / 2})">${esc(yKey)}</text>`;
  svg += `<text class="tick" x="${pad.l}" y="${pad.t + plotH + 14}">${esc(fmtScore(xmin))}</text>`;
  svg += `<text class="tick" x="${pad.l + plotW}" y="${pad.t + plotH + 14}" text-anchor="end">${esc(fmtScore(xmax))}</text>`;
  svg += `<text class="tick" x="${pad.l - 6}" y="${pad.t + plotH}" text-anchor="end">${esc(fmtScore(ymin))}</text>`;
  svg += `<text class="tick" x="${pad.l - 6}" y="${pad.t + 8}" text-anchor="end">${esc(fmtScore(ymax))}</text>`;
  if (typeof threshold === 'number') {
    if (threshold >= xmin && threshold <= xmax) {
      const x = sx(threshold);
      svg += `<line class="threshold" x1="${x}" y1="${pad.t}" x2="${x}" y2="${pad.t + plotH}"/>`;
    }
    if (threshold >= ymin && threshold <= ymax) {
      const y = sy(threshold);
      svg += `<line class="threshold" x1="${pad.l}" y1="${y}" x2="${pad.l + plotW}" y2="${y}"/>`;
    }
  }
  for (const v of vals) {
    const color = modelColor(v.p.model, models);
    const title = `${v.p.model} · ${v.p.run_id} · ${xKey}=${fmtScore(v.x)} · ${yKey}=${fmtScore(v.y)}`;
    svg += `<circle class="pt" cx="${sx(v.x)}" cy="${sy(v.y)}" r="6" fill="${color}"><title>${esc(title)}</title></circle>`;
  }
  svg += '</svg>';
  return svg;
}

function renderResults() {
  const r = S.results;
  const series = resultsSeriesKeys(r.runs);
  const points = resultsPoints(r.runs, r.modelFilter);
  const models = [...new Set(points.map(p => p.model))].sort();
  const ths = notebookThresholds();
  const threshold = ths.length ? ths[0].threshold : null;
  let html = masthead();

  if (!(r.runs || []).length) {
    html += `<div class="results-empty"><div class="glyph">❧</div>
      <p>No trials on the ledger yet — run an eval cell, then return to the bench.</p>
      <p class="hint">Scores arrive from <span class="mono">_metrics/bench-log.jsonl</span>.</p></div>`;
    $('#main').innerHTML = html;
    return;
  }

  html += `<div class="results-bar">
    <div class="hint">${S.nb ? esc(S.nb) : 'all notebooks'} · ${points.length} candidate×run point${points.length === 1 ? '' : 's'}</div>
    <div class="filters">
      <label>model <select onchange="setResultsFilter(this.value)">
        <option value="">All models</option>
        ${(r.models || []).map(m => `<option value="${esc(m)}" ${r.modelFilter === m ? 'selected' : ''}>${esc(m)}</option>`).join('')}
      </select></label>
      <label>X <select onchange="setResultsAxis('x', this.value)">
        ${series.map(k => `<option value="${esc(k)}" ${r.xKey === k ? 'selected' : ''}>${esc(k)}</option>`).join('')}
      </select></label>
      <label>Y <select onchange="setResultsAxis('y', this.value)">
        ${series.map(k => `<option value="${esc(k)}" ${r.yKey === k ? 'selected' : ''}>${esc(k)}</option>`).join('')}
      </select></label>
    </div>
  </div>`;

  const cards = resultsStats(points);
  if (cards.length) {
    html += '<div class="stat-grid">' + cards.map(c => `
      <div class="stat-card">
        <div class="label">${esc(c.label)}</div>
        <div class="value">${esc(c.value)}</div>
        ${c.delta ? `<span class="delta ${c.delta.dir || ''}">${esc(c.delta.text)}</span>` : ''}
        ${c.note ? `<div class="note">${esc(c.note)}</div>` : ''}
      </div>`).join('') + '</div>';
  }

  const title = (r.xKey && r.yKey) ? `${r.xKey} vs ${r.yKey}` : 'Scatter';
  html += `<div class="scatter-wrap"><div class="scatter-head">
    <h2>${esc(title)}</h2>
    <div class="scatter-legend">${models.map(m =>
      `<span style="color:${modelColor(m, models)}"><i></i>${esc(m)}</span>`).join('')}</div>
  </div>${renderScatterSvg(points, r.xKey, r.yKey, models, threshold)}</div>`;

  $('#main').innerHTML = html;
}

function setResultsFilter(value) {
  S.results.modelFilter = value || '';
  renderResults();
}
function setResultsAxis(which, value) {
  if (which === 'x') S.results.xKey = value;
  if (which === 'y') S.results.yKey = value;
  renderResults();
}

// ---------------------------------------------------------------------------
// journal — every eval run, catalogued
// ---------------------------------------------------------------------------
async function loadJournal() {
  if (!S.ws) {
    $('#main').innerHTML = masthead() + '<div class="journal-empty"><div class="glyph">❧</div><p>Pick a workspace to open the journal.</p></div>';
    return;
  }
  try {
    const d = await api('/api/journal?ws=' + encodeURIComponent(S.ws));
    S.journal.runs = d.runs || [];
    S.journal.notebooks = d.notebooks || [];
    S.journal.models = d.models || [];
    // keep detail only if that run is still present
    if (S.journal.openId && !S.journal.runs.some(r => r.run_id === S.journal.openId)) {
      S.journal.openId = null; S.journal.detail = null;
    }
    renderJournal();
  } catch (e) {
    $('#main').innerHTML = masthead() + `<div class="journal-empty"><div class="glyph">❧</div>
      <p>Could not read the journal: ${esc(e.message || e)}</p></div>`;
  }
}

function filteredJournalRuns() {
  const j = S.journal;
  return (j.runs || []).filter(r => {
    if (j.nbFilter && r.notebook !== j.nbFilter) return false;
    if (j.modelFilter && !(r.models || []).includes(j.modelFilter)) return false;
    return true;
  });
}

function journalWindowLabel(runs) {
  if (!runs.length) return 'no runs match';
  const dates = runs.map(r => r.date).filter(Boolean).sort();
  if (!dates.length) return `${runs.length} run${runs.length === 1 ? '' : 's'}`;
  const newest = new Date(dates[dates.length - 1] + 'T00:00:00Z');
  const oldest = new Date(dates[0] + 'T00:00:00Z');
  const spanDays = Math.max(1, Math.round((newest - oldest) / 86400000) + 1);
  const window = spanDays <= 7 ? 'last 7 days' : `last ${spanDays} days`;
  return `${runs.length} run${runs.length === 1 ? '' : 's'} · ${window}`;
}

function scoreBand(score) {
  if (score == null || Number.isNaN(Number(score))) return { pct: 0, band: 'lo', label: '—' };
  const n = Number(score);
  // judge means are often 1–5; metric means often 0–1
  const pct = Math.max(0, Math.min(100, Math.round((n <= 1 ? n : n / 5) * 100)));
  const band = pct >= 70 ? 'hi' : pct >= 40 ? 'mid' : 'lo';
  return { pct, band, label: String(n) };
}

function formatRunTime(run) {
  // prefer ISO date from the log; decorate with stamp from run-YYYYMMDDHHMMSS
  const m = String(run.run_id || '').match(/^run-(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})/);
  if (m) {
    const iso = `${m[1]}-${m[2]}-${m[3]}T${m[4]}:${m[5]}:00`;
    const d = new Date(iso);
    if (!Number.isNaN(d.getTime())) {
      const today = new Date();
      const sameDay = d.toDateString() === today.toDateString();
      const hhmm = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (sameDay) return hhmm + ' today';
      return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' · ' + hhmm;
    }
  }
  return run.date || '—';
}

function renderJournal() {
  const j = S.journal;
  const runs = filteredJournalRuns();
  let html = masthead();
  html += `<div class="journal-bar">
    <div class="journal-count"><b>${esc(journalWindowLabel(runs))}</b></div>
    <div class="journal-filters">
      <select id="j-nb" onchange="setJournalFilter('nb', this.value)" title="filter by notebook">
        <option value="">All notebooks</option>
        ${(j.notebooks || []).map(n => `<option value="${esc(n)}" ${j.nbFilter === n ? 'selected' : ''}>${esc(n)}</option>`).join('')}
      </select>
      <select id="j-model" onchange="setJournalFilter('model', this.value)" title="filter by model">
        <option value="">All models</option>
        ${(j.models || []).map(m => `<option value="${esc(m)}" ${j.modelFilter === m ? 'selected' : ''}>${esc(m)}</option>`).join('')}
      </select>
    </div>
  </div>`;

  if (!(j.runs || []).length) {
    html += `<div class="journal-empty"><div class="glyph">❧</div>
      <p>The journal is blank — no eval runs recorded yet.</p>
      <p class="hint">Run an eval cell from the field notebook; every trial lands here, catalogued newest first.</p>
    </div>`;
    $('#main').innerHTML = html;
    return;
  }
  if (!runs.length) {
    html += `<div class="journal-empty"><div class="glyph">❧</div>
      <p>No runs match these filters.</p>
      <p class="hint">Clear a chip, or run another eval — the ledger only shows what you ask for.</p>
    </div>`;
    $('#main').innerHTML = html;
    return;
  }

  html += `<table class="journal-table"><thead><tr>
    <th>Run id</th><th>Status</th><th>Notebook</th><th>Model</th><th>Score</th><th>Items</th><th>Time</th>
  </tr></thead><tbody>`;
  runs.forEach((r, i) => {
    const sc = scoreBand(r.score);
    const status = r.status || 'passed';
    const open = j.openId === r.run_id;
    const clsRow = ['run-row', i === 0 && !j.nbFilter && !j.modelFilter ? 'newest' : '', open ? 'open' : ''].filter(Boolean).join(' ');
    html += `<tr class="${clsRow}" onclick="openJournalRun(event,'${esc(r.notebook)}','${esc(r.run_id)}')">
      <td class="jid">${esc(r.run_id)}</td>
      <td><span class="pill ${cls(status)}">${esc(status.charAt(0).toUpperCase() + status.slice(1))}</span></td>
      <td class="j-pipe"><span class="name">${esc(r.notebook)}</span>
        <span class="meta">eval · ${esc(r.cell || '—')} · ${esc(r.date || '')}</span></td>
      <td class="j-model">${esc((r.models || []).join(', ') || '—')}</td>
      <td class="score-cell"><div class="score-bar"><i class="${sc.band}" style="width:${sc.pct}%"></i></div>
        <span class="score-val">${esc(sc.label)}</span></td>
      <td class="j-num">${esc(r.n)}</td>
      <td class="j-time">${esc(formatRunTime(r))}</td>
    </tr>`;
    if (open) {
      html += `<tr class="detail-row"><td colspan="7">${renderJournalDetail(j.detail)}</td></tr>`;
    }
  });
  html += '</tbody></table>';
  $('#main').innerHTML = html;
}

function renderJournalDetail(detail) {
  if (!detail) return `<div class="journal-detail"><span class="spin">◌</span> loading run…</div>`;
  if (detail.error) return `<div class="journal-detail"><div class="err">${esc(detail.error)}</div></div>`;
  // reuse the eval output renderer — shape matches a live eval cell output
  const fakeOut = {
    run_id: detail.run_id,
    rows: detail.rows,
    metrics: detail.metrics,
    results_path: detail.results_path,
    summary: detail.summary,
    results: detail.results,
  };
  return `<div class="journal-detail">
    <div class="detail-head">
      <button class="back" onclick="event.stopPropagation(); closeJournalRun()">← close</button>
      <span class="jid">${esc(detail.run_id)}</span>
      <span class="kv">${esc(detail.notebook)} · ${esc(detail.cell || '')}</span>
    </div>
    ${outEval(fakeOut)}
  </div>`;
}

function setJournalFilter(kind, value) {
  if (kind === 'nb') S.journal.nbFilter = value || '';
  if (kind === 'model') S.journal.modelFilter = value || '';
  // closing detail when filters hide it is handled by filtered list
  renderJournal();
}

async function openJournalRun(ev, nb, runId) {
  if (ev && ev.stopPropagation) ev.stopPropagation();
  if (S.journal.openId === runId) { closeJournalRun(); return; }
  S.journal.openId = runId;
  S.journal.detail = null;
  renderJournal();
  try {
    const d = await api('/api/journal/run?ws=' + encodeURIComponent(S.ws)
      + '&nb=' + encodeURIComponent(nb) + '&run=' + encodeURIComponent(runId));
    if (S.journal.openId !== runId) return;
    S.journal.detail = d;
    renderJournal();
  } catch (e) {
    if (S.journal.openId !== runId) return;
    S.journal.detail = { error: String(e.message || e) };
    renderJournal();
  }
}

function closeJournalRun() {
  S.journal.openId = null;
  S.journal.detail = null;
  renderJournal();
}

// ---------------------------------------------------------------------------
// flow canvas — graph view, layout-only editing
// ---------------------------------------------------------------------------
function flowCells() {
  return (S.notebook && S.notebook.cells) || [];
}

function flowOrderedCells() {
  const cells = flowCells();
  const byId = new Map(cells.map(c => [c.id, c]));
  const ids = [...((S.notebook.graph && S.notebook.graph.order) || []), ...cells.map(c => c.id)]
    .filter((id, i, a) => byId.has(id) && a.indexOf(id) === i);
  return ids.map(id => byId.get(id));
}

function flowDepths() {
  // ALAP layering: the canvas reads source → result. A node with consumers
  // sits immediately left of its earliest consumer, so metrics/judges hug
  // the eval that uses them instead of piling into column 0; sinks (eval,
  // annotate) take the rightmost columns. Data cells always anchor at
  // column 0 — even consumerless ones (they are sources awaiting a consumer,
  // not sinks) — and isolated cells (the leading note) stay at column 0.
  const graph = (S.notebook && S.notebook.graph) || { deps: {}, order: [] };
  const cells = flowOrderedCells();
  if (!cells.length) return {};
  const byId = new Map(cells.map(c => [c.id, c]));
  const consumers = new Map(cells.map(c => [c.id, []]));
  for (const c of cells) {
    for (const d of graph.deps[c.id] || []) if (consumers.has(d)) consumers.get(d).push(c.id);
  }
  // Forward (ASAP) pass just to find the graph's span — sinks seat there.
  let span = 0;
  {
    const asap = {};
    for (const c of cells) {
      const deps = (graph.deps[c.id] || []).filter(d => byId.has(d));
      asap[c.id] = deps.length ? Math.max(...deps.map(d => asap[d] || 0)) + 1 : 0;
      span = Math.max(span, asap[c.id]);
    }
  }
  // ALAP pass over reverse-topological order: depth = min(depth of consumers) - 1.
  const depths = {};
  for (let i = cells.length - 1; i >= 0; i--) {
    const c = cells[i];
    const cons = consumers.get(c.id);
    depths[c.id] = cons.length
      ? Math.min(...cons.map(k => (depths[k] !== undefined ? depths[k] : span))) - 1
      : span;
  }
  // Normalize to min 0, then pin anchors.
  const min = Math.min(...Object.values(depths));
  for (const c of cells) {
    depths[c.id] -= min;
    const hasCons = consumers.get(c.id).length > 0;
    const hasDeps = (graph.deps[c.id] || []).some(d => byId.has(d));
    if ((!hasCons && !hasDeps) || c.type === 'data') depths[c.id] = 0;
  }
  return depths;
}

function autoFlowPositions() {
  const depths = flowDepths();
  const rows = {};
  const out = {};
  const snap = n => Math.round(n / 8) * 8;
  for (const c of flowOrderedCells()) {
    const d = depths[c.id] || 0;
    rows[d] = rows[d] || 0;
    out[c.id] = { x: snap(36 + d * 260), y: snap(38 + rows[d] * 126) };
    rows[d]++;
  }
  return out;
}

function flowPositions() {
  const auto = autoFlowPositions();
  const saved = (S.flow.layout && S.flow.layout.positions) || {};
  const out = {};
  for (const id of Object.keys(auto)) out[id] = saved[id] || auto[id];
  return out;
}

function flowSize(pos) {
  const vals = Object.values(pos);
  const maxX = vals.length ? Math.max(...vals.map(p => p.x)) : 0;
  const maxY = vals.length ? Math.max(...vals.map(p => p.y)) : 0;
  return { w: Math.max(780, maxX + 270), h: Math.max(540, maxY + 170) };
}

// A control node fresh off the palette has an empty config — switch/map/
// retry/catch/tool ship no starter fields, so there is nothing to run yet
// and nothing wrong. Grey "unconfigured" beats red: errors mean "ran and
// failed" or "config invalid", not "you just created me". Display-side only;
// the moment any field is set, the normal states take over.
const CONTROL_TYPES = new Set(['switch', 'map', 'retry', 'catch', 'tool']);
function isUnconfigured(cell) {
  return CONTROL_TYPES.has(cell.type) && !Object.keys(cell.config || {}).length;
}

function flowStatus(cell) {
  if (cell.type === 'note') return { cls: 'note', label: 'note' };
  if (isUnconfigured(cell)) return { cls: 'unconfigured', label: 'unconfigured' };
  if (S.running.has('__all__') || S.running.has(cell.id)) return { cls: 'running', label: 'running' };
  const st = (S.notebook.state || {})[cell.id] || {};
  if (st.error) return { cls: 'error', label: 'error' };
  if (!st.ran_at) return { cls: '', label: 'never ran' };
  if (st.stale) return { cls: 'stale', label: 'stale' };
  return { cls: 'fresh', label: 'fresh' };
}

function cellSecondary(cell) {
  const c = cell.config || {};
  if (cell.type === 'agent' || cell.type === 'judge') {
    if (c.input_from) return `from ${c.input_from}${c.input_path ? '.' + c.input_path : ''}`;
    return [c.provider, c.model].filter(Boolean).join('/') || c.kind || 'model';
  }
  if (cell.type === 'metric') return c.kind || 'metric';
  if (cell.type === 'golden') return c.set || 'golden set';
  if (cell.type === 'data') return c.source || `${Array.isArray(c.rows) ? c.rows.length : 0} rows`;
  if (cell.type === 'prompt') return c.template ? 'template' : 'prompt';
  if (cell.type === 'eval') return `data: ${c.data || 'unset'}`;
  if (cell.type === 'annotate') return c.golden ? `golden: ${c.golden}` : `source: ${c.source || 'unset'}`;
  if (cell.type === 'note') return clip(cell.text || 'note', 60);
  return cell.type;
}

// every cell-type glyph resolves to a <symbol> in the icon-defs sheet; unknown
// types fall back to the plain #ic-cell frame. cls() guards the id, so the
// returned markup is safe to inline unescaped.
const CELL_ICON_IDS = new Set(['note', 'data', 'prompt', 'agent', 'metric', 'judge', 'golden', 'eval', 'annotate', 'switch', 'map', 'retry', 'catch', 'tool']);
function cellIcon(type) {
  const id = CELL_ICON_IDS.has(type) ? cls(type) : 'cell';
  return `<svg class="type-icon" aria-hidden="true"><use href="#ic-${id}"/></svg>`;
}

function renderFlowEdges(pos, size) {
  const graph = S.notebook.graph || { deps: {} };
  const byId = Object.fromEntries((S.notebook.cells || []).map(c => [c.id, c]));
  const selected = S.flow.selected;
  let svg = `<svg class="flow-edges" viewBox="0 0 ${size.w} ${size.h}" aria-hidden="true">`;
  for (const [to, deps] of Object.entries(graph.deps || {})) {
    for (const from of deps || []) {
      if (!pos[from] || !pos[to]) continue;
      const x1 = pos[from].x + 190, y1 = pos[from].y + 41;
      const x2 = pos[to].x, y2 = pos[to].y + 41;
      const gap = Math.max(80, Math.abs(x2 - x1) / 2);
      const hot = selected === from || selected === to;
      const toCell = byId[to];
      const chain = toCell && toCell.config && toCell.config.input_from === from;
      svg += `<path class="flow-edge ${chain ? 'chain' : ''} ${hot ? 'hot' : ''}" d="M ${x1} ${y1} C ${x1 + gap} ${y1}, ${x2 - gap} ${y2}, ${x2} ${y2}"/>`;
    }
  }
  const connecting = S.flow.connect;
  if (connecting && pos[connecting.from] && connecting.point) {
    const x1 = pos[connecting.from].x + 190;
    const y1 = pos[connecting.from].y + 41;
    const x2 = connecting.point.x;
    const y2 = connecting.point.y;
    const gap = Math.max(60, Math.abs(x2 - x1) / 2);
    svg += `<path class="flow-edge ghost" d="M ${x1} ${y1} C ${x1 + gap} ${y1}, ${x2 - gap} ${y2}, ${x2} ${y2}"/>`;
  }
  return svg + '</svg>';
}

function renderFlowNode(cell, pos) {
  const st = flowStatus(cell);
  const selected = S.flow.selected === cell.id;
  return `<div class="flow-node ${selected ? 'selected' : ''}" id="flow-${esc(cell.id)}"
    data-id="${esc(cell.id)}" style="left:${pos.x}px;top:${pos.y}px"
    onclick="selectFlowNode('${esc(cell.id)}')" onpointerdown="startFlowDrag(event,'${esc(cell.id)}')">
    <div class="node-top">
      <span class="node-icon">${cellIcon(cell.type)}</span>
      <span class="node-id">${esc(cell.id)}</span>
      <span class="node-dot ${st.cls}" title="${esc(st.label)}"></span>
    </div>
    <div class="node-sub">${esc(cellSecondary(cell))}</div>
    ${cell.type === 'note' ? '' : `<button type="button" class="flow-connect-port" aria-label="connect from ${esc(cell.id)}" title="drag to connect" onpointerdown="startFlowConnect(event,'${esc(cell.id)}')" onmousedown="startFlowConnect(event,'${esc(cell.id)}')"></button>`}
  </div>`;
}

function renderFlowInspector() {
  if (!S.flow.inspectorOpen) return '';
  const cells = flowOrderedCells();
  const selected = cells.find(c => c.id === S.flow.selected) || cells.find(c => c.type !== 'note') || cells[0];
  const closeBtn = `<button class="quiet insp-close" title="close inspector — click any node to reopen" onclick="S.flow.inspectorOpen=false;S.flow.editing=false;renderFlow()">×</button>`;
  if (!selected) return `<aside class="flow-inspector"><div class="insp-head"><h2>Inspector</h2>${closeBtn}</div><div class="meta">Select a node</div><div class="meta">Click a node to inspect</div></aside>`;
  S.flow.selected = selected.id;
  const editing = S.flow.editing;
  const st = selected.type === 'note' ? null : ((S.notebook.state || {})[selected.id] || {});
  const status = flowStatus(selected);
  const deps = ((S.notebook.graph && S.notebook.graph.deps[selected.id]) || []).join(', ') || 'none';
  const rdeps = ((S.notebook.graph && S.notebook.graph.rdeps[selected.id]) || []).join(', ') || 'none';
  const cfg = selected.type === 'note' ? { text: selected.text || '' } : (selected.config || {});
  const last = st ? {
    state: status.label,
    ran_at: st.ran_at || null,
    stale: Boolean(st.stale),
    error: st.error || null,
    output: st.output ? '(output recorded)' : null,
  } : { state: 'not runnable' };
  const editBody = selected.type === 'note'
    ? `<textarea id="flow-ed-${esc(selected.id)}" rows="10" placeholder="note text…">${esc(selected.text || '')}</textarea>`
    : `<textarea id="flow-ed-${esc(selected.id)}" rows="14" spellcheck="false">${esc(selected.raw || '')}</textarea>`;
  const body = editing
    ? `<h3>Edit</h3>${editBody}
       <div class="insp-actions">
         <button class="primary" onclick="saveFlowCell('${esc(selected.id)}')">save</button>
         <button onclick="cancelFlowEdit()">cancel</button>
       </div>`
    : `${renderSchemaEditor(selected)}
       <h3>Last run</h3><pre class="block">${esc(JSON.stringify(last, null, 2))}</pre>
       <div class="insp-actions">
         <button onclick="startFlowEdit()">✎ edit</button>
         <button onclick="duplicateFlowCell('${esc(selected.id)}')">duplicate</button>
         <button class="quiet" onclick="deleteFlowCell('${esc(selected.id)}')">delete</button>
       </div>`;
  return `<aside class="flow-inspector">
    <div class="insp-head"><h2>${esc(selected.id)}</h2>${closeBtn}</div>
    <div class="meta">${esc(selected.type)} · deps: ${esc(deps)} · downstream: ${esc(rdeps)}</div>
    <div class="status-line"><span class="node-dot ${status.cls}"></span>${esc(status.label)}${st && st.ran_at ? ' · ' + esc(ago(st.ran_at)) : ''}</div>
    <button class="primary" onclick="runCell('${esc(selected.id)}')" ${selected.type === 'note' || editing || S.running.has(selected.id) || S.running.has('__all__') ? 'disabled' : ''}>${S.running.has(selected.id) ? '<span class="spin">◌</span> running' : '▶ run this cell'}</button>
    ${body}
  </aside>`;
}

function schemaFields(type) {
  return ({
    data: ['file', 'golden', 'limit', 'needs'],
    prompt: ['data', 'template', 'system', 'needs'],
    agent: ['provider', 'model', 'prompt', 'data', 'input_from', 'input_path', 'max_turns', 'needs'],
    metric: ['kind', 'expr', 'threshold', 'needs'],
    judge: ['kind', 'provider', 'model', 'dimensions', 'rubric', 'scale', 'threshold', 'needs'],
    golden: ['set', 'provider', 'model', 'seed_data', 'count', 'instructions', 'needs'],
    eval: ['data', 'candidates', 'metrics', 'judges', 'limit', 'needs'],
    annotate: ['source', 'golden', 'labels', 'scale', 'instructions', 'needs'],
    switch: ['input', 'default', 'needs'],
    map: ['input', 'filter', 'expr', 'needs'],
    retry: ['target', 'attempts', 'needs'],
    catch: ['try', 'fallback', 'needs'],
  })[type] || ['needs'];
}

function renderSchemaEditor(cell) {
  if (cell.type === 'note') return `<h3>Config</h3><pre class="block">${esc(JSON.stringify({ text: cell.text || '' }, null, 2))}</pre>`;
  const cfg = cell.config || {};
  const fields = schemaFields(cell.type);
  const rows = fields.map(key => {
    const v = cfg[key];
    const value = Array.isArray(v) ? v.join(', ') : (v == null ? '' : String(v));
    const tag = ['template', 'system', 'rubric', 'instructions', 'expr', 'filter'].includes(key) ? 'textarea' : 'input';
    const input = tag === 'textarea'
      ? `<textarea id="schema-${esc(cell.id)}-${esc(key)}" rows="4">${esc(value)}</textarea>`
      : `<input id="schema-${esc(cell.id)}-${esc(key)}" value="${esc(value)}">`;
    return `<div class="field-row"><label>${esc(key)}</label>${input}</div>`;
  }).join('');
  return `<h3>Fields</h3><div class="field-grid">${rows}</div>
    <div class="insp-actions">
      <button class="primary" onclick="saveFlowFields('${esc(cell.id)}')">save fields</button>
    </div>
    ${renderConnectEditor(cell)}
    <h3>Config</h3><pre class="block">${esc(JSON.stringify(cfg, null, 2))}</pre>`;
}

function renderConnectEditor(cell) {
  if (cell.type === 'note') return '';
  const cells = flowOrderedCells().filter(c => c.id !== cell.id && c.type !== 'note');
  const options = cells.map(c => `<option value="${esc(c.id)}">${esc(c.id)} · ${esc(c.type)}</option>`).join('');
  const fields = refFieldsFor(cell.type).filter(f => !f.includes('.'));
  const fieldOptions = ['auto', ...fields].map(f => `<option value="${esc(f)}">${esc(f)}</option>`).join('');
  return `<h3>Connect</h3>
    <div class="connect-row">
      <div class="field-row"><label>from</label><select id="connect-from-${esc(cell.id)}">${options}</select></div>
      <div class="field-row"><label>field</label><select id="connect-field-${esc(cell.id)}">${fieldOptions}</select></div>
      <button onclick="connectFlowCell('${esc(cell.id)}')" ${cells.length ? '' : 'disabled'}>connect</button>
    </div>`;
}

function refFieldsFor(type) {
  return ({
    data: ['needs'],
    prompt: ['data', 'needs'],
    agent: ['prompt', 'data', 'needs'],
    metric: ['needs'],
    judge: ['needs'],
    golden: ['seed_data', 'needs'],
    eval: ['data', 'candidates', 'metrics', 'judges', 'needs'],
    annotate: ['source', 'golden', 'needs'],
    switch: ['input', 'default', 'needs'],
    map: ['input', 'needs'],
    retry: ['target', 'needs'],
    catch: ['try', 'fallback', 'needs'],
  })[type] || ['needs'];
}

function renderRunLog() {
  return `<details class="run-log" ${S.flow.logOpen ? 'open' : ''} ontoggle="S.flow.logOpen=this.open">
    <summary>run log · ${S.flow.runLog.length} line${S.flow.runLog.length === 1 ? '' : 's'}</summary>
    <div class="lines">${S.flow.runLog.length
      ? S.flow.runLog.map(l => `<div class="line"><b>${esc(l.stamp)}</b> ${esc(l.msg)}</div>`).join('')
      : '<div class="line">no runs from this canvas yet</div>'}</div>
  </details>`;
}

function renderFlow() {
  const nb = S.notebook;
  if (!nb) { $('#main').innerHTML = masthead() + '<div class="plate"><p>Pick a notebook to draw the specimen plate.</p></div>'; return; }
  const cells = flowOrderedCells();
  const pos = flowPositions();
  const size = flowSize(pos);
  if (!S.flow.selected || !cells.some(c => c.id === S.flow.selected)) S.flow.selected = (cells.find(c => c.type !== 'note') || cells[0] || {}).id || null;
  const leadingNote = cells.find(c => c.type === 'note' && c.text);
  // one icon button per cell type — same addFlowCell path the old ADD row used.
  // The topbar owns run-all; the canvas keeps only its node palette and
  // floating layout control so the graph reads without a text toolbar.
  const palette = `<nav class="flow-palette" aria-label="add a cell">
    <span class="pal-head">add</span>
    ${(S.boot.cell_types || []).map(t =>
      `<button type="button" class="pal-btn" data-type="${esc(t)}" aria-label="add ${esc(t)} cell" onclick="addFlowCell('${esc(t)}')">${cellIcon(t)}</button>`).join('')}
  </nav>`;
  let html = `<div class="flow-shell">${masthead()}`;
  if (nb.graph && nb.graph.cycle && nb.graph.cycle.length) {
    html += `<div class="out"><span class="err">dependency cycle: ${esc(nb.graph.cycle.join(', '))}</span></div>`;
  }
  html += `<div class="flow-board${S.flow.inspectorOpen ? '' : ' no-insp'}">${palette}<section class="flow-stage"><div class="flow-plane" id="flow-plane" style="width:${size.w}px;height:${size.h}px">
    ${renderFlowEdges(pos, size)}
    ${cells.map(c => renderFlowNode(c, pos[c.id])).join('')}
    ${leadingNote ? `<div class="flow-note-card" tabindex="0" onclick="selectFlowNode('${esc(leadingNote.id)}')"><div class="label">PLATE · SPECIMEN</div><div class="body">${mdLite(clip(leadingNote.text, 260))}</div></div>` : ''}
    <button type="button" class="flow-relayout" title="re-lay-out — tidy the graph" aria-label="re-lay-out — tidy the graph" onclick="relayoutFlow()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 7h-5V2"/><path d="M4 17h5v5"/><path d="M19 12a7 7 0 0 0-12-5L4 10"/><path d="M5 12a7 7 0 0 0 12 5l3-3"/></svg></button>
  </div></section>${renderFlowInspector()}</div>
  ${renderRunLog()}</div>`;
  $('#main').innerHTML = html;
}

function selectFlowNode(id) {
  if (S.flow.editing && S.flow.selected !== id) S.flow.editing = false;
  S.flow.selected = id;
  S.flow.inspectorOpen = true;   // clicking a node is the way back in after ✕
  renderFlow();
}

function startFlowEdit() {
  if (!S.flow.selected) return;
  S.flow.editing = true;
  S.flow.inspectorOpen = true;
  renderFlow();
  const ta = document.getElementById('flow-ed-' + S.flow.selected);
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

function cancelFlowEdit() {
  S.flow.editing = false;
  renderFlow();
}

async function saveFlowCell(id) {
  const cell = S.notebook.cells.find(c => c.id === id);
  const ta = document.getElementById('flow-ed-' + id);
  if (!cell || !ta) return;
  await saveCellValue(cell, ta.value, () => {
    S.flow.editing = false;
    S.flow.selected = id;
    S.flow.inspectorOpen = true;
  });
}

async function saveFlowFields(id) {
  const cell = S.notebook.cells.find(c => c.id === id);
  if (!cell || cell.type === 'note') return;
  const updates = {};
  for (const key of schemaFields(cell.type)) {
    const el = document.getElementById('schema-' + id + '-' + key);
    if (el) updates[key] = el.value;
  }
  try {
    const r = await post('/api/cell-config', { ws: S.ws, nb: S.nb, id, updates });
    S.notebook = r.notebook;
    S.flow.selected = id;
    S.flow.inspectorOpen = true;
    S.flow.editing = false;
    toast('fields saved');
    render();
  } catch (e) { toast(String(e.message || e)); }
}

async function duplicateFlowCell(id) {
  const positions = currentFlowPositionsFromDom();
  try {
    const r = await post('/api/cell-duplicate', { ws: S.ws, nb: S.nb, id });
    S.notebook = r.notebook;
    if (r.id) {
      const anchor = positions[id] || { x: 36, y: 38 };
      positions[r.id] = { x: anchor.x + 32, y: anchor.y + 32 };
      S.flow.selected = r.id;
      S.flow.inspectorOpen = true;
      S.flow.editing = false;
      await saveFlowLayout(positions);
    }
    toast('duplicated');
    render();
  } catch (e) { toast(String(e.message || e)); }
}

async function connectFlowCell(to) {
  const fromEl = document.getElementById('connect-from-' + to);
  const fieldEl = document.getElementById('connect-field-' + to);
  const from = fromEl && fromEl.value;
  const field = fieldEl && fieldEl.value !== 'auto' ? fieldEl.value : '';
  if (!from) return;
  try {
    const r = await post('/api/cell-connect', { ws: S.ws, nb: S.nb, from, to, field });
    S.notebook = r.notebook;
    S.flow.selected = to;
    S.flow.inspectorOpen = true;
    S.flow.editing = false;
    toast('connected ' + from + ' → ' + to);
    render();
  } catch (e) { toast(String(e.message || e)); }
}

async function addFlowCell(type) {
  const before = new Set((S.notebook && S.notebook.cells || []).map(c => c.id));
  const cells = (S.notebook && S.notebook.cells) || [];
  // Markdown prose cells are not separately fenced; adjacent notes merge on
  // parse. Appending a note after the last typed cell gives it durable identity.
  const anchorId = type === 'note' ? (cells[cells.length - 1] || {}).id : S.flow.selected;
  try {
    const r = await post('/api/cell-add', { ws: S.ws, nb: S.nb, type, after: anchorId || undefined });
    S.notebook = r.notebook;
    const added = r.notebook.cells.map(c => c.id).find(cid => !before.has(cid));
    if (added) {
      S.flow.selected = added;
      S.flow.editing = true;
      S.flow.inspectorOpen = true;
      const positions = currentFlowPositionsFromDom();
      if (!positions[added]) {
        const anchor = positions[anchorId] || { x: 36, y: 38 };
        positions[added] = { x: anchor.x + 32, y: anchor.y + 32 };
        await saveFlowLayout(positions);
      }
    }
    toast('added ' + type + ' cell');
    render();
  } catch (e) { toast(String(e.message || e)); }
}

async function deleteFlowCell(id) {
  if (!confirm('Delete cell "' + id + '"? This writes the notebook file.')) return;
  const positions = currentFlowPositionsFromDom();
  delete positions[id];
  try {
    const r = await post('/api/cell-delete', { ws: S.ws, nb: S.nb, id });
    S.notebook = r.notebook;
    if (S.flow.selected === id) S.flow.selected = null;
    S.flow.editing = false;
    await saveFlowLayout(positions);
    toast('deleted');
    render();
  } catch (e) { toast(String(e.message || e)); }
}

function currentFlowPositionsFromDom() {
  const out = flowPositions();
  for (const node of document.querySelectorAll('.flow-node[data-id]')) {
    out[node.dataset.id] = {
      x: parseInt(node.style.left, 10) || 0,
      y: parseInt(node.style.top, 10) || 0,
    };
  }
  return out;
}

async function saveFlowLayout(positions) {
  try {
    const r = await post('/api/layout', { ws: S.ws, nb: S.nb, layout: { positions } });
    S.flow.layout = r.layout;
  } catch (e) { toast(String(e.message || e)); }
}

async function relayoutFlow() {
  try {
    const r = await post('/api/layout', { ws: S.ws, nb: S.nb, reset: true });
    S.flow.layout = r.layout; // null — next render uses topo auto-layout
  } catch (e) {
    S.flow.layout = null;
    toast(String(e.message || e));
  }
  renderFlow();
}

function startFlowDrag(ev, id) {
  if (ev.button != null && ev.button !== 0) return;
  const node = ev.currentTarget;
  const plane = document.getElementById('flow-plane');
  if (!node || !plane) return;
  S.flow.selected = id;
  const nr = node.getBoundingClientRect();
  const offsetX = ev.clientX - nr.left;
  const offsetY = ev.clientY - nr.top;
  node.setPointerCapture(ev.pointerId);
  const move = e => {
    const pr = plane.getBoundingClientRect();
    const x = Math.max(8, Math.round((e.clientX - pr.left - offsetX) / 8) * 8);
    const y = Math.max(8, Math.round((e.clientY - pr.top - offsetY) / 8) * 8);
    node.style.left = x + 'px';
    node.style.top = y + 'px';
    redrawFlowEdges();
  };
  const up = async e => {
    node.releasePointerCapture(e.pointerId);
    node.removeEventListener('pointermove', move);
    node.removeEventListener('pointerup', up);
    await saveFlowLayout(currentFlowPositionsFromDom());
    renderFlow();
  };
  node.addEventListener('pointermove', move);
  node.addEventListener('pointerup', up);
}

function startFlowConnect(ev, from) {
  if (S.flow.connect) return;
  if (ev.button != null && ev.button !== 0) return;
  ev.preventDefault();
  ev.stopPropagation();
  const port = ev.currentTarget;
  const plane = document.getElementById('flow-plane');
  if (!port || !plane) return;
  const pointer = Number.isInteger(ev.pointerId);
  if (pointer) port.setPointerCapture(ev.pointerId);
  S.flow.connect = { from, point: flowPointerPoint(ev, plane), target: null };
  redrawFlowEdges();
  const setTarget = e => {
    const hit = document.elementFromPoint(e.clientX, e.clientY);
    const node = hit && hit.closest('.flow-node[data-id]');
    const target = node && node.dataset.id !== from ? node.dataset.id : null;
    for (const el of document.querySelectorAll('.flow-node.connect-target')) el.classList.remove('connect-target');
    if (node && target) node.classList.add('connect-target');
    S.flow.connect.point = flowPointerPoint(e, plane);
    S.flow.connect.target = target;
    redrawFlowEdges();
  };
  const finish = async e => {
    setTarget(e);
    const target = S.flow.connect && S.flow.connect.target;
    if (pointer && port.hasPointerCapture(e.pointerId)) port.releasePointerCapture(e.pointerId);
    const targetEl = pointer ? port : window;
    targetEl.removeEventListener(pointer ? 'pointermove' : 'mousemove', setTarget);
    targetEl.removeEventListener(pointer ? 'pointerup' : 'mouseup', finish);
    targetEl.removeEventListener(pointer ? 'pointercancel' : 'mouseleave', cancel);
    for (const el of document.querySelectorAll('.flow-node.connect-target')) el.classList.remove('connect-target');
    S.flow.connect = null;
    redrawFlowEdges();
    if (!target) return;
    try {
      const r = await post('/api/cell-connect', { ws: S.ws, nb: S.nb, from, to: target });
      S.notebook = r.notebook;
      S.flow.selected = target;
      toast('connected ' + from + ' → ' + target);
      renderFlow();
    } catch (err) {
      toast(String(err.message || err));
      renderFlow();
    }
  };
  const cancel = e => {
    if (pointer && port.hasPointerCapture(e.pointerId)) port.releasePointerCapture(e.pointerId);
    const targetEl = pointer ? port : window;
    targetEl.removeEventListener(pointer ? 'pointermove' : 'mousemove', setTarget);
    targetEl.removeEventListener(pointer ? 'pointerup' : 'mouseup', finish);
    targetEl.removeEventListener(pointer ? 'pointercancel' : 'mouseleave', cancel);
    for (const el of document.querySelectorAll('.flow-node.connect-target')) el.classList.remove('connect-target');
    S.flow.connect = null;
    redrawFlowEdges();
  };
  const targetEl = pointer ? port : window;
  targetEl.addEventListener(pointer ? 'pointermove' : 'mousemove', setTarget);
  targetEl.addEventListener(pointer ? 'pointerup' : 'mouseup', finish);
  targetEl.addEventListener(pointer ? 'pointercancel' : 'mouseleave', cancel);
}

function flowPointerPoint(ev, plane) {
  const r = plane.getBoundingClientRect();
  return {
    x: Math.max(0, Math.round(ev.clientX - r.left)),
    y: Math.max(0, Math.round(ev.clientY - r.top)),
  };
}

function redrawFlowEdges() {
  const plane = document.getElementById('flow-plane');
  if (!plane) return;
  const pos = currentFlowPositionsFromDom();
  const size = flowSize(pos);
  const old = plane.querySelector('.flow-edges');
  if (old) old.outerHTML = renderFlowEdges(pos, size);
}

function render() {
  const nb = S.notebook;
  if (!nb && S.view === 'notebook') return;
  const runAllBtn = $('#run-all');
  runAllBtn.innerHTML = S.running.has('__all__') ? '<span class="spin">◌</span> running' : '▶ run all';
  const stopRunBtn = $('#stop-run');
  stopRunBtn.hidden = S.running.size === 0;

  if (S.view === 'journal') { renderJournal(); return; }
  if (S.view === 'results') { renderResults(); return; }
  if (S.view === 'flow') { renderFlow(); return; }
  if (S.view !== 'notebook') { $('#main').innerHTML = plate(S.view); return; }
  if (!nb) return;

  const typed = nb.cells.filter(c => c.type !== 'note');
  let html = masthead();

  html += `<div class="nb-tools"><span class="kicker" style="font:600 10.5px var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--text-3)">add cell</span>` +
    S.boot.cell_types.map(t => `<button class="quiet" onclick="addCell('${t}')">+ ${t}</button>`).join('') + '</div>';

  // graph strip: topo order with fresh/stale/error state — the notebook's shape
  if (typed.length) {
    html += '<div class="graph">' + nb.graph.order
      .filter(id => typed.some(c => c.id === id))
      .map((id, i) => {
        const st = nb.state[id] || {};
        const cell = typed.find(x => x.id === id);
        const c = (cell && isUnconfigured(cell)) ? '' : st.error ? 'err' : st.stale ? 'stale' : st.ran_at ? 'fresh' : '';
        return (i ? '<span class="arrow">→</span>' : '') +
          `<span class="gcell ${c}" onclick="document.getElementById('cell-${esc(id)}').scrollIntoView({behavior:'smooth',block:'center'})">${esc(id)}</span>`;
      }).join('') + '</div>';
    if (nb.graph.cycle.length) html += `<div class="out"><span class="err">dependency cycle: ${esc(nb.graph.cycle.join(', '))}</span></div>`;
  }

  for (const cell of nb.cells) html += renderCell(cell);

  $('#main').innerHTML = html;

  // number-key shortcuts for annotation. Scoped (review finding): they fire
  // for the panel that has focus, or — the common case — when exactly one
  // annotate panel is on the page. Two visible panels with neither focused →
  // no ambient firing; click into one first.
  document.onkeydown = e => {
    if (/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
    const panels = [...document.querySelectorAll('.anno-item')];
    if (!panels.length) return;
    const focused = panels.find(p => p.contains(document.activeElement));
    const panel = focused || (panels.length === 1 ? panels[0] : null);
    if (!panel) return;
    const btn = panel.querySelector('.anno-buttons button[data-key="' + e.key + '"]');
    if (btn) { btn.click(); e.preventDefault(); }
  };
}

function renderCell(cell) {
  if (cell.type === 'note') {
    const editing = S.editing.has(cell.id);
    return `<div class="cell note" id="cell-${esc(cell.id)}">
      <div class="note-body">
        <button class="quiet note-edit" onclick="toggleEdit('${esc(cell.id)}')">✎</button>
        ${editing
          ? `<textarea id="ed-${esc(cell.id)}" rows="${Math.min(14, (cell.text || '').split('\n').length + 2)}">${esc(cell.text)}</textarea>
             <div class="editor bar" style="display:flex"><button class="primary" onclick="saveCell('${esc(cell.id)}')">save</button>
             <button onclick="toggleEdit('${esc(cell.id)}')">cancel</button></div>`
          : mdLite(cell.text)}
      </div></div>`;
  }

  const st = (S.notebook.state || {})[cell.id] || {};
  const running = S.running.has(cell.id) || S.running.has('__all__');
  const editing = S.editing.has(cell.id) || cell.error;
  const unconf = isUnconfigured(cell);
  const dot = unconf ? 'never' : st.error ? 'err' : !st.ran_at ? 'never' : st.stale ? 'stale' : '';
  const dotTitle = unconf ? 'unconfigured — fill in its fields to wire it into the graph'
    : st.error ? 'last run errored' : !st.ran_at ? 'never ran' : st.stale ? 'stale — config or upstream changed' : 'fresh';

  return `<div class="cell ${editing ? 'editing' : ''}" id="cell-${esc(cell.id)}">
    <div class="cell-head">
      <span class="chip ${cls(cell.type)}">${esc(cell.type)}</span>
      <span class="cid">${esc(cell.id)}</span>
      <span class="status-dot ${dot}" title="${dotTitle}"></span>
      <span class="when">${st.ran_at ? ago(st.ran_at) : ''}</span>
      <span class="spacer"></span>
      <button class="quiet" onclick="toggleEdit('${esc(cell.id)}')" title="edit config">✎</button>
      <button class="quiet" onclick="deleteCell('${esc(cell.id)}')" title="delete">×</button>
      <button onclick="runCell('${esc(cell.id)}')" ${running ? 'disabled' : ''}>${running ? '<span class="spin">◌</span>' : '▶'}</button>
    </div>
    <div class="editor">
      <textarea id="ed-${esc(cell.id)}" rows="${Math.min(18, (cell.raw || '').split('\n').length + 2)}">${esc(cell.raw || '')}</textarea>
      <div class="bar"><button class="primary" onclick="saveCell('${esc(cell.id)}')">save</button>
      <button onclick="toggleEdit('${esc(cell.id)}')">cancel</button>
      ${cell.error ? `<span class="err" style="color:var(--red);font-size:12px">${esc(cell.error)}</span>` : ''}</div>
    </div>
    <div class="out">${renderOutput(cell, st)}</div>
  </div>`;
}

function renderOutput(cell, st) {
  if (isUnconfigured(cell)) return '<div class="empty">unconfigured — fill in its fields (✎) to wire it into the graph</div>';
  if (st.error) return `<div class="err">${esc(st.error)}</div>`;
  if (!st.output) return '<div class="empty">not run yet — hit ▶</div>';
  const o = st.output;
  try {
    switch (cell.type) {
      case 'data': return outData(o);
      case 'prompt': return outPrompt(o);
      case 'agent': return outAgent(o);
      case 'metric': return `<div class="kv">kind <b>${esc(o.kind)}</b> · dry-run value <b>${esc(o.sample_value)}</b></div>`;
      case 'judge': return outJudge(o);
      case 'golden': return outGolden(o);
      case 'eval': return outEval(o);
      case 'annotate': return outAnnotate(cell, o);
      default: return `<pre class="block">${esc(JSON.stringify(o, null, 2)).slice(0, 4000)}</pre>`;
    }
  } catch (e) { return `<div class="err">render error: ${esc(e.message)}</div>`; }
}

function tableOf(rows, columns, cap) {
  const cols = columns && columns.length ? columns : Object.keys(rows[0] || {});
  const shown = rows.slice(0, cap || 8);
  return `<div class="scroll"><table><tr>${cols.map(c => `<th>${esc(c)}</th>`).join('')}</tr>` +
    shown.map(r => `<tr>${cols.map(c => `<td>${esc(clip(r[c], 140))}</td>`).join('')}</tr>`).join('') +
    `</table></div>` +
    (rows.length > shown.length ? `<div class="kv">showing ${shown.length} of <b>${rows.length}</b></div>` : '');
}
const clip = (v, n) => { const s = v == null ? '' : typeof v === 'object' ? JSON.stringify(v) : String(v); return s.length > n ? s.slice(0, n - 1) + '…' : s; };

function outData(o) {
  if (!o.count) return `<div class="empty">0 rows (${esc(o.source)}) — for a golden-set source, approve rows in its annotate cell first.</div>`;
  return tableOf(o.rows, o.columns) + `<div class="kv"><b>${o.count}</b> rows · source <b>${esc(o.source)}</b></div>`;
}

function outPrompt(o) {
  return (o.system ? `<div class="kv">system: ${esc(clip(o.system, 200))}</div>` : '') +
    `<pre class="block">${esc(o.template)}</pre>` +
    `<div class="kv">vars: ${o.vars.map(v => `<b>{{${esc(v)}}}</b>`).join(' ') || '(none)'}` +
    (o.preview ? `</div><div class="kv">preview (first row):</div><pre class="block">${esc(clip(o.preview, 600))}</pre>` : '</div>');
}

function outAgent(o) {
  return `<div class="kv">smoke test on: <b>${esc(clip(o.sample_row && (o.sample_row.input || JSON.stringify(o.sample_row)), 120))}</b></div>` +
    `<pre class="block">${esc(clip(o.output, 1200))}</pre>` + trace(o.turns) + usage(o.usage, o.provider, o.model);
}

function trace(turns) {
  if (!turns || !turns.length) return '';
  return `<div class="trace">` + turns.map(t =>
    t.kind === 'tool'
      ? `<div class="t tool"><span class="tag">↳ tool ${esc(t.tool)}(${esc(clip(JSON.stringify(t.args), 80))})</span> → ${esc(clip(t.result, 120))}</div>`
      : `<div class="t"><span class="tag">turn ${t.turn} model</span> ${t.tool_calls && t.tool_calls.length ? '→ calls ' + t.tool_calls.map(c => esc(c.name)).join(', ') : esc(clip(t.text, 150))}</div>`
  ).join('') + `</div>`;
}
function usage(u, provider, model) {
  if (!u) return '';
  return `<div class="kv">${provider ? `<b>${esc(provider)}/${esc(model)}</b> · ` : ''}tokens in <b>${u.input_tokens || 0}</b> out <b>${u.output_tokens || 0}</b>${u.cost_usd ? ` · $${u.cost_usd}` : ''}</div>`;
}

function outJudge(o) {
  const s = o.sample || {};
  return `<div class="kv">kind <b>${esc(o.kind)}</b>${o.provider ? ` · <b>${esc(o.provider)}${o.model ? '/' + esc(o.model) : ''}</b>` : ''} · dimensions: <b>${esc((o.dimensions || []).join(', '))}</b></div>` +
    `<div class="kv">sample judgment: <span class="verdict ${cls(s.verdict)}">${esc(s.verdict || '?')}</span> overall <b>${esc(s.overall)}</b>/${esc(s.scale || 5)}${s.rationale ? ` — ${esc(clip(s.rationale, 160))}` : ''}</div>`;
}

function outGolden(o) {
  return `<div class="kv">set <b>${esc(o.set)}</b> · generated <b>${o.generated}</b> new drafts · ` +
    `now <b>${o.approved}</b> approved / <b>${o.draft}</b> draft / <b>${o.rejected}</b> rejected of ${o.total}</div>` +
    (o.preview && o.preview.length ? tableOf(o.preview.map(publicish), null, 5) : '') +
    `<div class="kv">drafts need a human — approve them in an annotate cell with <b>golden: ${esc(o.set)}</b>.</div>`;
}
const publicish = r => { const x = {}; for (const k in r) if (!/^_|^(status|origin|created|generator|decided)/.test(k)) x[k] = r[k]; return x; };

function outEval(o) {
  const s = o.summary || {};
  const metricNames = o.metrics || [];
  let html = `<div class="scroll"><table><tr><th>candidate</th><th>provider/model</th><th class="num">n</th>` +
    metricNames.map(m => `<th class="num">${esc(m)}</th>`).join('') +
    `<th class="num">judge</th><th class="num">pass</th><th class="num">tokens</th><th class="num">ms</th></tr>`;
  for (const c of s.candidates || []) {
    const win = s.winner === c.candidate;
    html += `<tr>
      <td class="${win ? 'winner' : ''}">${esc(c.candidate)}${win ? ' ★' : ''}</td>
      <td>${esc(c.provider || '')}/${esc(c.model || '')}</td>
      <td class="num">${c.n}${c.errors ? ` <span style="color:var(--red)">(${c.errors} err)</span>` : ''}</td>` +
      metricNames.map(m => `<td class="num">${c.metrics[m] == null ? '—' : esc(c.metrics[m])}</td>`).join('') +
      `<td class="num">${c.judge && c.judge.overall_mean != null ? esc(c.judge.overall_mean) : '—'}</td>
      <td class="num">${c.judge && c.judge.pass_rate != null ? Math.round(c.judge.pass_rate * 100) + '%' : '—'}</td>
      <td class="num">${(c.tokens.input + c.tokens.output) || 0}</td>
      <td class="num">${c.latency_ms_mean == null ? '—' : c.latency_ms_mean}</td></tr>`;
  }
  html += '</table></div>';
  html += `<div class="kv">run <b>${esc(o.run_id)}</b> · ${o.rows} rows · results at <b>${esc(o.results_path)}</b></div>`;
  // per-row detail, collapsed
  html += `<details style="margin-top:8px"><summary style="cursor:pointer;color:var(--text-3);font-size:12.5px">per-row results (${(o.results || []).length})</summary>`;
  html += `<div class="scroll"><table><tr><th>item</th><th>input</th><th>output</th><th>judge</th><th>metrics</th></tr>` +
    (o.results || []).map(r => {
      const j = firstJudgment(r.judgments);
      return `<tr><td>${esc(r.item_id)}</td><td>${esc(clip(r.row && (r.row.input != null ? r.row.input : r.row), 90))}</td>
        <td>${r.error ? `<span style="color:var(--red)">${esc(clip(r.error, 90))}</span>` : esc(clip(r.output, 110))}</td>
        <td>${j ? `<span class="verdict ${cls(j.verdict)}">${esc(j.verdict)}</span> ${esc(j.overall)}` : '—'}</td>
        <td class="num">${esc(clip(JSON.stringify(r.metrics), 60))}</td></tr>`;
    }).join('') + '</table></div></details>';
  return html;
}
const firstJudgment = js => { for (const k in (js || {})) if (js[k] && js[k].verdict) return js[k]; return null; };

// the HITL panel: one unlabeled item at a time, buttons + number keys
function outAnnotate(cell, o) {
  let html = `<div class="kv">${o.instructions ? esc(o.instructions) + ' · ' : ''}<b>${o.labeled}</b> of <b>${o.total}</b> labeled</div>`;
  html += `<div class="anno-progress"><i style="width:${o.total ? Math.round(o.labeled / o.total * 100) : 0}%"></i></div>`;
  const tally = Object.entries(o.tally || {});
  if (tally.length || o.judge_agreement) {
    html += `<div class="tally">${tally.map(([l, n]) => `<span><b>${esc(l)}</b>: ${n}</span>`).join('')}` +
      (o.judge_agreement ? `<span>judge agreement: <b>${Math.round(o.judge_agreement.rate * 100)}%</b> (n=${o.judge_agreement.n})</span>` : '') + `</div>`;
  }

  const isGolden = o.kind === 'golden';
  const queue = (o.items || []).filter(it => isGolden ? (it.status === 'draft') : !it.annotation);
  if (!queue.length) return html + `<div class="kv" style="margin-top:8px">✓ queue clear — ${isGolden ? 'no drafts awaiting review' : 'everything is labeled'}.</div>`;

  const it = queue[0];
  const set = (cell.config || {}).golden;
  html += `<div class="anno-item" tabindex="0">`;
  if (isGolden) {
    html += `<div class="q">draft golden row (${queue.length} awaiting review)</div>` +
      `<pre class="block">${esc(JSON.stringify(it.row, null, 2))}</pre>` +
      `<div class="anno-buttons">
        <button class="primary" data-key="1" onclick="decideGoldenItem('${esc(cell.id)}','${esc(set)}','${esc(it.item_id)}','approved')">approve<span class="key">1</span></button>
        <button data-key="2" onclick="decideGoldenItem('${esc(cell.id)}','${esc(set)}','${esc(it.item_id)}','rejected')">reject<span class="key">2</span></button>
      </div>`;
  } else {
    const j = firstJudgment(it.judgments);
    html += `<div class="q">${esc(it.item_id)} · candidate <b>${esc(it.candidate || '')}</b> (${queue.length} left)</div>` +
      `<div class="kv">input:</div><pre class="block">${esc(clip(it.row && (it.row.input != null ? it.row.input : JSON.stringify(it.row)), 500))}</pre>` +
      `<div class="kv">output:</div><pre class="block">${it.error ? esc(it.error) : esc(clip(it.output, 900))}</pre>` +
      (j ? `<div class="kv">judge says: <span class="verdict ${cls(j.verdict)}">${esc(j.verdict)}</span> ${esc(j.overall)} — label blind, then compare</div>` : '');
    const labels = o.labels || (o.scale ? Array.from({ length: o.scale }, (_, i) => String(i + 1)) : []);
    html += `<div class="anno-buttons">` + labels.map((l, i) =>
      `<button ${i === 0 ? 'class="primary"' : ''} data-key="${i + 1}" onclick="annotateItem('${esc(cell.id)}','${esc(it.item_id)}','${esc(l)}')">${esc(l)}<span class="key">${i + 1}</span></button>`
    ).join('') + `</div>`;
  }
  html += `</div>`;
  return html;
}

// a deliberately tiny markdown: headings, paragraphs, inline code, bold — the
// note cells are prose, not documents; anything richer belongs in docs/.
// Inline markup is built token-by-token with ONE escape pass per text piece,
// so reordering can never reopen an XSS hole (review finding).
function mdLite(text) {
  const blocks = String(text || '').split(/\n\s*\n/);
  return blocks.map(b => {
    const t = b.trim();
    if (!t) return '';
    const h = t.match(/^(#{1,3})\s+(.*)$/s);
    if (h) return `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`;
    return `<p>${inline(t)}</p>`;
  }).join('');
  function inline(s) {
    // split into `code` / **bold** / plain tokens; escape each piece exactly once
    return String(s).split(/(`[^`]+`|\*\*[^*]+\*\*)/g).map(part => {
      if (/^`[^`]+`$/.test(part)) return '<code>' + esc(part.slice(1, -1)) + '</code>';
      if (/^\*\*[^*]+\*\*$/.test(part)) return '<b>' + esc(part.slice(2, -2)) + '</b>';
      return esc(part);
    }).join('');
  }
}

boot().catch(e => { $('#main').innerHTML = `<div class="home">failed to load: ${esc(e.message)}</div>`; });
</script>
</body>
</html>
